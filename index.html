              <div style={{display:'flex',alignItems:'center',gap:'4px',flexShrink:0}}>
                <div style={{fontSize:'10px',padding:'1px 6px',borderRadius:'4px',
                  background:item.type==='event'?'#e0e7ff':item.type==='reminder'?'#fef3c7':'#fce7f3',
                  color:item.type==='event'?'#3730a3':item.type==='reminder'?'#92400e':'#9d174d'}}>
                  {item.type==='event'?(item.data.type||'ประชุม'):item.type==='reminder'?'แจ้งเตือน':'งานส่ง'}
                </div>
                {(item.type==='task'||item.type==='event')&&<span style={{fontSize:'10px',color:'#9ca3af'}}>›</span>}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Today's Note Summary */}
      {((dayNotes&&dayNotes[TODAY]&&dayNotes[TODAY].trim())||noteEditMode)&&(
        <div style={{background:'white',border:'1px solid #c4b5fd',borderRadius:'12px',padding:'14px',marginBottom:'14px',borderLeft:'4px solid #8b5cf6',boxShadow:'0 1px 3px rgba(0,0,0,.04)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}}>
            <h3 style={{margin:0,color:'#5b21b6',fontSize:'14px'}}>📝 บันทึกประจำวันนี้</h3>
            {!noteEditMode
              ? <button className="btn-ghost btn-xs" style={{color:'#8b5cf6',fontWeight:600}} onClick={()=>{setNoteText(dayNotes[TODAY]||'');setNoteEditMode(true);}}>✏️ แก้ไข</button>
              : <div style={{display:'flex',gap:'5px'}}>
                  <button className="btn-success btn-xs" onClick={()=>{if(setDayNotes)setDayNotes({...dayNotes,[TODAY]:noteText});setNoteEditMode(false);}}>💾 บันทึก</button>
                  <button className="btn-secondary btn-xs" onClick={()=>setNoteEditMode(false)}>ยกเลิก</button>
                </div>
            }
          </div>
          {noteEditMode
            ? <textarea value={noteText} onChange={e=>setNoteText(e.target.value)}
                style={{width:'100%',minHeight:'140px',resize:'vertical',fontSize:'12px',lineHeight:'1.75',padding:'10px 13px',borderRadius:'8px',border:'1px solid #ddd6fe',fontFamily:'inherit',marginBottom:0}}
                autoFocus placeholder="จดบันทึกประจำวัน..."/>
            : <div style={{fontSize:'12px',color:'#374151',lineHeight:'1.75',whiteSpace:'pre-wrap',background:'#faf5ff',padding:'10px 13px',borderRadius:'8px',maxHeight:'160px',overflowY:'auto',borderLeft:'3px solid #ddd6fe',fontFamily:'inherit'}}>
                {dayNotes[TODAY]}
              </div>
          }
        </div>
      )}

      {/* Stats */}
      <div className="stats-grid">
        {[{l:'📊 โครงการ',v:stats.projects,c:'#1f2937'},{l:'📋 กิจกรรม',v:stats.tasks,c:'#1f2937'},{l:'✅ เสร็จสิ้น',v:stats.done,c:'#10b981'},{l:'⏳ กำลังทำ',v:stats.inprog,c:'#3b82f6'},{l:'🔥 เร่งด่วน',v:stats.urgent,c:'#f97316'},{l:'⚠️ เกินกำหนด',v:stats.overdue,c:'#ef4444'},{l:'👥 สมาชิก',v:stats.members,c:'#8b5cf6'}].map((s,i)=>(
          <div key={i} className="stat-card"><div className="stat-label">{s.l}</div><div className="stat-value" style={{color:s.c}}>{s.v}</div></div>
        ))}
      </div>

      {/* Project Timeline with milestone pins */}
      {projects.length>0&&(
        <div className="card" style={{marginTop:'12px'}}>
          <h3 style={{marginBottom:'12px'}}>📅 Timeline โครงการ
            <span style={{fontWeight:400,fontSize:'11px',color:'#6b7280',marginLeft:'8px'}}>หมุด = วันส่งงาน | เส้นแดง = วันนี้</span>
          </h3>
          <div className="timeline-wrap">
            {projects.map(proj=>{
              if(!proj.startDate||!proj.endDate) return null;
              const prog=calcProgress(proj.tasks);
              const startPct=tlPct(proj.startDate);
              const endPct=tlPct(proj.endDate);
              const width=Math.max(1,endPct-startPct);
              return(
                <div key={proj.id} className="tl-project-row">
                  <div className="tl-label">
                    <span style={{color:proj.color}}>{proj.name}</span>
                    <span style={{color:'#6b7280',fontSize:'11px',fontWeight:400}}>{prog}% • {proj.tasks.length} งาน</span>
                  </div>
                  <div className="tl-track">
                    {/* Date labels */}
                    <div className="tl-date-lbl" style={{left:`${startPct}%`}}>{fmt(proj.startDate,{month:'short',day:'numeric'})}</div>
                    <div className="tl-date-lbl" style={{left:`${endPct}%`,transform:'translateX(-100%)'}}>{fmt(proj.endDate,{month:'short',day:'numeric'})}</div>
                    {/* Background bar segment */}
                    <div style={{position:'absolute',left:`${startPct}%`,width:`${width}%`,height:'100%',background:'#e0e7ff',borderRadius:'10px'}}/>
                    {/* Progress fill */}
                    <div className="tl-fill" style={{left:`${startPct}%`,width:`${width*prog/100}%`,background:proj.color}}/>
                    {/* Today line */}
                    {todayTLPct>=0&&todayTLPct<=100&&(
                      <>
                        <div className="tl-today" style={{left:`${todayTLPct}%`}}/>
                        <div className="tl-today-lbl" style={{left:`${todayTLPct}%`}}>วันนี้</div>
                      </>
                    )}
                    {/* Task milestone pins */}
                    {proj.tasks.filter(t=>t.dueDate).map(t=>{
                      const p=tlPct(t.dueDate);
                      if(p<0||p>100) return null;
                      const ds=getDueStatus(t);
                      return(
                        <div key={t.id} className="tl-pin" style={{left:`${p}%`,background:ds.color}}
                          onMouseEnter={e=>setTooltip({x:e.clientX,y:e.clientY,task:t,projectName:proj.name})}
                          onMouseLeave={()=>setTooltip(null)}
                        />
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px',marginTop:'0'}}>
        {/* Urgent tasks */}
        <div className="card">
          <h3>⚠️ งานเร่งด่วน <span style={{fontWeight:400,fontSize:'10px',color:'#9ca3af'}}>คลิกเพื่อดูรายละเอียด</span></h3>
          {allTasks.filter(t=>t.status!=='เสร็จสิ้น'&&daysLeft(t.dueDate)<=3).sort((a,b)=>daysLeft(a.dueDate)-daysLeft(b.dueDate)).slice(0,5).map((t,i)=>{
            const ds=getDueStatus(t);
            const chain=getParentChain(t);
            return(<div key={i} onClick={()=>setTaskViewModal({projId:t.projId,task:t})} style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',padding:'7px 8px',background:'#fef9f9',borderRadius:'6px',marginBottom:'5px',gap:'6px',cursor:'pointer',border:'1px solid #fecaca',transition:'background .12s'}}
              onMouseEnter={e=>e.currentTarget.style.background='#fee2e2'} onMouseLeave={e=>e.currentTarget.style.background='#fef9f9'}
            >
              <div style={{flex:1,minWidth:0}}>
                {chain.length>0&&(
                  <div style={{fontSize:'9px',color:'#9ca3af',marginBottom:'1px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                    {t.pn} › {chain.join(' › ')}
                  </div>
                )}
                <div style={{fontWeight:700,fontSize:'11px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                  {t.level>0&&<span style={{fontSize:'8px',marginRight:'4px',opacity:.6}}>{'▸'.repeat(t.level)}</span>}
                  {t.name}
                </div>
                <div style={{fontSize:'9px',color:'#6b7280'}}>{chain.length===0&&`${t.pn} • `}{t.assignee}</div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:'4px',flexShrink:0,paddingTop:'1px'}}>
                <span className={`due-alert ${ds.cls}`}>{ds.text}</span>
                <span style={{fontSize:'10px',color:'#9ca3af'}}>›</span>
              </div>
            </div>);
          })}
          {allTasks.filter(t=>t.status!=='เสร็จสิ้น'&&daysLeft(t.dueDate)<=3).length===0&&<div className="empty" style={{padding:'16px'}}>ไม่มีงานเร่งด่วน 🎉</div>}
        </div>

        {/* Monthly chart */}
        <div className="card">
          <h3>📊 กิจกรรมรายเดือน</h3>
          {monthStats.length===0?<div className="empty" style={{padding:'16px'}}>ไม่มีข้อมูล</div>:(
            <>
              <div style={{display:'flex',alignItems:'flex-end',gap:'5px',height:'110px',padding:'0 4px',marginTop:'6px',position:'relative'}}>
                {monthStats.map((m,i)=>(
                  <div key={i} style={{display:'flex',flexDirection:'column',alignItems:'center',flex:1,gap:'2px',cursor:'pointer'}}
                    onMouseEnter={e=>setChartTooltip({x:e.clientX,y:e.clientY,m})}
                    onMouseLeave={()=>setChartTooltip(null)}
                    onMouseMove={e=>setChartTooltip(ct=>ct?{...ct,x:e.clientX,y:e.clientY}:null)}
                  >
                    <div style={{fontSize:'9px',fontWeight:600,color:'#374151'}}>{m.total}</div>
                    <div style={{width:'100%',position:'relative',display:'flex',flexDirection:'column',justifyContent:'flex-end'}}>
                      <div style={{width:'100%',height:`${Math.round(m.total/maxMV*90)}px`,background:'#dbeafe',borderRadius:'3px 3px 0 0',minHeight:'4px',position:'relative'}}>
                        <div style={{position:'absolute',bottom:0,width:'100%',height:`${Math.round(m.done/maxMV*90)}px`,background:'#10b981',borderRadius:'3px 3px 0 0',minHeight:m.done?'4px':'0'}}/>
                      </div>
                    </div>
                    <div style={{fontSize:'9px',color:'#6b7280',textAlign:'center'}}>{m.key.slice(5)}/{m.key.slice(2,4)}</div>
                  </div>
                ))}
              </div>
              <div style={{display:'flex',gap:'10px',marginTop:'5px',fontSize:'9px',color:'#6b7280'}}>
                <span>🟦 ทั้งหมด</span><span>🟩 เสร็จสิ้น</span>
                <span style={{color:'#9ca3af'}}>💡 ชี้เมาส์ที่แท่งเพื่อดูรายละเอียด</span>
              </div>
              {chartTooltip&&(
                <div className="tooltip-box" style={{top:chartTooltip.y-10,left:chartTooltip.x+14,maxWidth:'240px'}}>
                  <div style={{fontWeight:700,marginBottom:'5px',borderBottom:'1px solid #374151',paddingBottom:'4px'}}>
                    📅 {chartTooltip.m.key} &nbsp;·&nbsp; {chartTooltip.m.total} งาน ({chartTooltip.m.done} เสร็จ)
                  </div>
                  {chartTooltip.m.tasks.slice(0,5).map((t,i)=>{
                    const ds=getDueStatus(t);
                    return(
                      <div key={i} style={{marginBottom:'5px',paddingBottom:'4px',borderBottom:'1px solid #2d3748'}}>
                        <div style={{fontSize:'11px',fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.name}</div>
                        <div style={{fontSize:'10px',color:'#9ca3af'}}>👤 {t.assignee}{t.projectName&&` · ${t.projectName}`}</div>
                        <div style={{fontSize:'10px',marginTop:'1px'}}>{ds.text}</div>
                      </div>
                    );
                  })}
                  {chartTooltip.m.tasks.length>5&&<div style={{fontSize:'10px',color:'#9ca3af',marginTop:'2px'}}>+{chartTooltip.m.tasks.length-5} งานอื่นๆ</div>}
                </div>
              )}
            </>
          )}
        </div>
      </div>

      <Tooltip tooltip={tooltip}/>

      {/* Task VIEW modal (read-only) → เปิดก่อน → มีปุ่ม แก้ไข */}
      {taskViewModal&&(()=>{
        const t=taskViewModal.task;
        const ds=getDueStatus(t);
        const proj=projects.find(p=>p.id===taskViewModal.projId);
        const chain=getParentChain(t);
        return(
          <Modal show onClose={()=>setTaskViewModal(null)} title="📋 รายละเอียดกิจกรรม" size="md">
            <div style={{display:'flex',flexDirection:'column',gap:'9px',fontSize:'13px'}}>
              <div style={{fontSize:'16px',fontWeight:700,color:'#1f2937'}}>{t.name}</div>
              <div style={{display:'flex',gap:'6px',flexWrap:'wrap',alignItems:'center'}}>
                <LevelBadge level={t.level}/><PriBadge p={t.priority}/>
                <span className={`due-alert ${ds.cls}`}>{ds.text}</span>
              </div>
              {chain.length>0&&<div style={{fontSize:'11px',color:'#9ca3af'}}>{proj?.name} › {chain.join(' › ')}</div>}
              <div style={{display:'flex',gap:'16px',flexWrap:'wrap',fontSize:'12px',color:'#374151'}}>
                {proj&&<span>📁 {proj.name}</span>}
                <span>👤 {t.assignee}</span>
                <span>📅 {t.startDate?fmt(t.startDate)+' → ':''}{fmt(t.dueDate)}</span>
                <span style={{background:'#f3f4f6',padding:'1px 7px',borderRadius:'4px'}}>{t.status}</span>
              </div>
              {t.description&&<div style={{background:'#f9fafb',padding:'9px 10px',borderRadius:'7px',fontSize:'12px',color:'#374151',borderLeft:'3px solid #d1d5db',lineHeight:1.6}}>{t.description}</div>}
              {t.notes&&<div style={{background:'#fef3c7',padding:'9px 10px',borderRadius:'7px',fontSize:'12px',color:'#78350f',borderLeft:'3px solid #f59e0b',lineHeight:1.6}}>📝 โน๊ต: {t.notes}</div>}
              {(t.comments||[]).length>0&&(
                <div>
                  <div style={{fontSize:'11px',fontWeight:600,color:'#6b7280',marginBottom:'5px'}}>💬 ความคิดเห็น ({t.comments.length})</div>
                  {t.comments.slice(0,3).map(c=>(
                    <div key={c.id} className="comment-item" style={{fontSize:'11px'}}><strong>{c.author}</strong>: {c.text}</div>
                  ))}
                  {t.comments.length>3&&<div style={{fontSize:'10px',color:'#9ca3af',marginTop:'3px'}}>+{t.comments.length-3} ความคิดเห็น</div>}
                </div>
              )}
            </div>
            <div style={{display:'flex',gap:'6px',marginTop:'14px'}}>
              <button className="btn-primary btn-sm" onClick={()=>{setTaskDetailModal(taskViewModal);setTaskViewModal(null);}}>✏️ แก้ไข</button>
              <button className="btn-secondary btn-sm" onClick={()=>setTaskViewModal(null)}>ปิด</button>
            </div>
          </Modal>
        );
      })()}

      {/* Task EDIT modal */}
      {taskDetailModal&&<TaskForm
        initial={taskDetailModal.task}
        projectId={taskDetailModal.projId}
        projects={projects} members={members}
        onSave={saveTask} onClose={()=>setTaskDetailModal(null)}
      />}

      {/* Event DETAIL modal (view) */}
      {evDetailModal&&(
        <Modal show onClose={()=>setEvDetailModal(null)} title="📅 รายละเอียดนัดหมาย" size="sm">
          <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
            <div style={{fontSize:'16px',fontWeight:700,color:'#1f2937'}}>{evDetailModal.title}</div>
            <div style={{display:'flex',gap:'12px',fontSize:'12px',color:'#374151',flexWrap:'wrap'}}>
              <span>📅 {fmt(evDetailModal.date)}</span>
              <span>🕐 {evDetailModal.time}–{evDetailModal.endTime}</span>
              <span style={{background:'#e0e7ff',color:'#3730a3',padding:'1px 8px',borderRadius:'10px',fontSize:'11px',fontWeight:600}}>🏷️ {evDetailModal.type}</span>
            </div>
            {(evDetailModal.attendees||[]).length>0&&(
              <div>
                <div style={{fontSize:'11px',fontWeight:600,color:'#6b7280',marginBottom:'4px'}}>👥 ผู้เข้าร่วม</div>
                <div style={{display:'flex',flexWrap:'wrap',gap:'4px'}}>
                  {evDetailModal.attendees.map((a,i)=>(
                    <span key={i} style={{background:'#f3f4f6',color:'#374151',padding:'2px 8px',borderRadius:'10px',fontSize:'11px'}}>{a}</span>
                  ))}
                </div>
              </div>
            )}
            {evDetailModal.description&&(
              <div style={{background:'#f9fafb',padding:'9px 10px',borderRadius:'7px',fontSize:'12px',color:'#374151',borderLeft:'3px solid #6366f1',lineHeight:1.55}}>
                {evDetailModal.description}
              </div>
            )}
            {evDetailModal.emailNotify&&(
              <div style={{fontSize:'11px',color:'#065f46',background:'#d1fae5',padding:'4px 9px',borderRadius:'6px'}}>
                📧 แจ้งเตือน Email ก่อน {evDetailModal.notifyBefore||30} นาที
              </div>
            )}
          </div>
          <div style={{display:'flex',gap:'6px',marginTop:'14px'}}>
            {setEvents&&<button className="btn-primary btn-sm" onClick={()=>{setEventEditModal(evDetailModal);setEvDetailModal(null);}}>✏️ แก้ไข</button>}
            <button className="btn-secondary btn-sm" onClick={()=>setEvDetailModal(null)}>ปิด</button>
          </div>
        </Modal>
      )}

      {/* Event EDIT modal */}
      {eventEditModal&&<EventForm
        initial={eventEditModal} members={members}
        onSave={saveEvent} onClose={()=>setEventEditModal(null)}
      />}
    </div>
  );
}

// ── SETTINGS MODAL ────────────────────────────────────────
function SettingsModal({gasUrl,setGasUrl,autoSync,setAutoSync,onSave,onClose}){
  const [url,setUrl]=useState(gasUrl);
  return(
    <Modal show onClose={onClose} title="⚙️ ตั้งค่า Google Sheets" size="md">
      <div className="info-box">
        <strong>📌 วิธีติดตั้ง:</strong>
        <ol>
          <li>เปิด <code>sheets.new</code> → Extensions → Apps Script</li>
          <li>วางโค้ดจากไฟล์ <code>google-apps-script-v2.gs</code></li>
          <li>Deploy → New Deployment → Web App → Execute as: Me → Access: Anyone</li>
          <li>คัดลอก URL → วางด้านล่าง</li>
        </ol>
      </div>
      <label>Google Apps Script URL:</label>
      <input value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://script.google.com/macros/s/.../exec"/>
      <div style={{display:'flex',alignItems:'center',gap:'7px',margin:'8px 0'}}>
        <input type="checkbox" id="as" checked={autoSync} onChange={e=>setAutoSync(e.target.checked)} style={{width:'auto',marginBottom:0}}/>
        <label htmlFor="as" style={{marginBottom:0,textTransform:'none',fontSize:'12px'}}>🔄 Auto-sync (บันทึกอัตโนมัติ 2 วิ หลังมีการเปลี่ยนแปลง)</label>
      </div>
      <div style={{display:'flex',gap:'6px'}}>
        <button className="btn-success" onClick={()=>{setGasUrl(url);onSave(url);onClose();}}>บันทึก URL</button>
        <button className="btn-secondary" onClick={onClose}>ปิด</button>
      </div>
    </Modal>
  );
}

// ── MAIN APP ─────────────────────────────────────────────
function PMDashboard(){
  const [projects,setProjects]=useState(SAMPLE_PROJECTS);
  const [members,setMembers]=useState(SAMPLE_MEMBERS);
  const [events,setEvents]=useState(SAMPLE_EVENTS);
  const [dayNotes,setDayNotes]=useState({});   // {date: text}
  const [reminders,setReminders]=useState([]); // [{id,date,time,text,done}]
  const [alertBanner,setAlertBanner]=useState(null); // {text}
  const [view,setView]=useState('dashboard');
  const [gasUrl,setGasUrl]=useState('');
  const [autoSync,setAutoSync]=useState(true);
  const [syncMsg,setSyncMsg]=useState('');
  const [syncType,setSyncType]=useState('');
  const [showSettings,setShowSettings]=useState(false);
  const [currentUser,setCurrentUser]=useState('all');
  const [showUserMenu,setShowUserMenu]=useState(false);

  const showStatus=(msg,type)=>{ setSyncMsg(msg); setSyncType(type); setTimeout(()=>setSyncMsg(''),3500); };

  useEffect(()=>{
    try{
      const url=localStorage.getItem('gasUrl_v2');
      const sm=localStorage.getItem('pm_members');
      const su=localStorage.getItem('pm_user');
      const se=localStorage.getItem('pm_events');
      const sdn=localStorage.getItem('pm_daynotes');
      const srm=localStorage.getItem('pm_reminders');
      if(url){setGasUrl(url);loadFromSheets(url);}
      if(sm){try{setMembers(JSON.parse(sm));}catch{}}
      if(su) setCurrentUser(su);
      if(se){try{setEvents(JSON.parse(se));}catch{}}
      if(sdn){try{setDayNotes(JSON.parse(sdn));}catch{}}
      if(srm){try{setReminders(JSON.parse(srm));}catch{}}
    }catch{}
    // Request browser notification permission
    if(typeof Notification!=='undefined'&&Notification.permission==='default') Notification.requestPermission();
  },[]);

  useEffect(()=>{ try{localStorage.setItem('pm_members',JSON.stringify(members));}catch{} },[members]);
  useEffect(()=>{ try{localStorage.setItem('pm_events',JSON.stringify(events));}catch{} },[events]);
  useEffect(()=>{ try{localStorage.setItem('pm_user',currentUser);}catch{} },[currentUser]);
  useEffect(()=>{ try{localStorage.setItem('pm_daynotes',JSON.stringify(dayNotes));}catch{} },[dayNotes]);
  useEffect(()=>{ try{localStorage.setItem('pm_reminders',JSON.stringify(reminders));}catch{} },[reminders]);

  // Reminder check every minute
  useEffect(()=>{
    const check=()=>{
      const now=new Date();
      const nowTime=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
      setReminders(prev=>{
        let changed=false;
        const updated=prev.map(r=>{
          if(r.date===TODAY&&r.time===nowTime&&!r.done){
            changed=true;
            if(typeof Notification!=='undefined'&&Notification.permission==='granted'){
              try{new Notification('⏰ PM Dashboard แจ้งเตือน',{body:r.text,silent:false});}catch{}
            }
            setAlertBanner({text:r.text,id:r.id});
            setTimeout(()=>setAlertBanner(null),6000);
            return {...r,done:true};
          }
          return r;
        });
        return changed?updated:prev;
      });
    };
    check();
    const iv=setInterval(check,60000);
    return()=>clearInterval(iv);
  },[]);

  // Auto-sync เมื่อข้อมูลหลักเปลี่ยน (projects, events, dayNotes, reminders)
  useEffect(()=>{
    if(!autoSync||!gasUrl) return;
    const t=setTimeout(()=>syncToSheets(),2000);
    return()=>clearTimeout(t);
  },[projects,events,dayNotes,reminders]);

  const syncToSheets=async()=>{
    if(!gasUrl){showStatus('❌ ยังไม่ได้ตั้งค่า URL','error');return;}
    showStatus('💾 กำลังบันทึก...','loading');
    try{
      // บันทึกข้อมูลทั้งหมด: projects, members, events, dayNotes, reminders
      await fetch(gasUrl,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},
        body:JSON.stringify({action:'save',data:{projects,members,events,dayNotes,reminders}})});
      showStatus('✅ บันทึกสำเร็จ','success');
    }catch{showStatus('❌ บันทึกไม่สำเร็จ','error');}
  };
  // โหลดข้อมูลด้วย JSONP — ไม่มีปัญหา CORS บนทุก browser / มือถือ
  const loadFromSheets=async url=>{
    const target=url||gasUrl;
    if(!target){showStatus('❌ กรุณาตั้งค่า URL ก่อน','error');return;}
    showStatus('📥 กำลังโหลด...','loading');
    try{
      const data = await new Promise((resolve,reject)=>{
        const cb='_pmcb_'+Date.now();
        const script=document.createElement('script');
        const timer=setTimeout(()=>{
          cleanup(); reject(new Error('Timeout — ตรวจสอบ URL และ Deploy settings'));
        },15000);
        const cleanup=()=>{
          delete window[cb];
          if(script.parentNode) script.parentNode.removeChild(script);
          clearTimeout(timer);
        };
        window[cb]=(d)=>{ cleanup(); resolve(d); };
        script.onerror=()=>{ cleanup(); reject(new Error('โหลด script ไม่สำเร็จ')); };
        script.src=`${target}?action=load&callback=${cb}&_=${Date.now()}`;
        document.head.appendChild(script);
      });
      if(data.error) throw new Error(data.error);
      if(data.projects) setProjects(data.projects);
      if(data.members)  setMembers(data.members);
      if(data.events)   setEvents(data.events);
      if(data.dayNotes) setDayNotes(data.dayNotes);
      if(data.reminders)setReminders(data.reminders);
      const cnt=data.projects?.length||0;
      showStatus(`✅ โหลดสำเร็จ (${cnt} โครงการ + บันทึก/นัดหมาย)`,'success');
    }catch(err){showStatus(`❌ โหลดไม่สำเร็จ: ${err.message}`,'error');}
  };
  const saveUrl=url=>{ try{localStorage.setItem('gasUrl_v2',url);}catch{} if(url)loadFromSheets(url); };

  const nowStr=new Date().toLocaleDateString('th-TH',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const tabs=[
    {id:'dashboard',label:'📈 Dashboard'},{id:'projects',label:'📁 โครงการ'},
    {id:'gantt',label:'📅 Gantt'},{id:'workload',label:'👥 Workload'},
    {id:'calendar',label:'🗓️ ปฏิทิน'},{id:'members',label:'👤 สมาชิก'},
  ];
  const curMember=members.find(m=>m.name===currentUser);

  return(
    <div className="container">
      <div className="header">
        <div className="header-top">
          <div>
            <h1>📊 PM Command Center <span style={{fontSize:'13px',fontWeight:400,color:'#8b5cf6'}}>v2</span></h1>
            <p className="subtitle">{nowStr}{gasUrl&&<span style={{marginLeft:'8px',color:'#10b981'}}>✅ Google Sheets</span>}</p>
          </div>
          <div className="header-actions">
            {/* User selector */}
            <div style={{position:'relative'}}>
              <div className="user-chip" onClick={()=>setShowUserMenu(m=>!m)}>
                <div className="mini-av">{curMember?curMember.name.charAt(0):'?'}</div>
                <span>{currentUser==='all'?'ทุกคน':currentUser}</span>
                <span style={{color:'#9ca3af',fontSize:'10px'}}>▾</span>
              </div>
              {showUserMenu&&(
                <div style={{position:'absolute',top:'32px',right:0,background:'white',border:'1px solid #e5e7eb',borderRadius:'8px',boxShadow:'0 4px 12px rgba(0,0,0,.1)',zIndex:200,minWidth:'160px',padding:'4px'}}>
                  <div style={{fontSize:'10px',color:'#9ca3af',padding:'4px 8px',fontWeight:600}}>เลือกบัญชีของคุณ</div>
                  {[{name:'all',display:'👁️ ทุกคน (ภาพรวม)'},...members.map(m=>({name:m.name,display:m.name}))].map(opt=>(
                    <div key={opt.name} onClick={()=>{setCurrentUser(opt.name);setShowUserMenu(false);}} style={{padding:'6px 10px',cursor:'pointer',borderRadius:'6px',fontSize:'12px',background:currentUser===opt.name?'#f0f0ff':'transparent',fontWeight:currentUser===opt.name?700:400}}>
                      {opt.display}
                    </div>
                  ))}
                </div>
              )}
            </div>
            <button className="btn-info btn-sm" onClick={()=>loadFromSheets()} disabled={!gasUrl}>📥 โหลด</button>
            <button className="btn-success btn-sm" onClick={syncToSheets} disabled={!gasUrl}>💾 บันทึก</button>
            <button className="btn-secondary btn-sm" onClick={()=>setShowSettings(true)}>⚙️ ตั้งค่า</button>
          </div>
        </div>
        {syncMsg&&<div className={`sync-status ${syncType}`}>{syncMsg}</div>}
        <div className="tabs">
          {tabs.map(t=><button key={t.id} className={`tab-btn ${view===t.id?'active':''}`} onClick={()=>setView(t.id)}>{t.label}</button>)}
        </div>
      </div>

      {view==='dashboard'&&<DashboardView projects={projects} setProjects={setProjects} members={members} events={events} setEvents={setEvents} currentUser={currentUser} reminders={reminders} dayNotes={dayNotes} setDayNotes={setDayNotes}/>}
      {view==='projects'&&<ProjectsView projects={projects} setProjects={setProjects} members={members}/>}
      {view==='gantt'&&<GanttView projects={projects} setProjects={setProjects} members={members}/>}
      {view==='workload'&&<WorkloadView projects={projects} members={members}/>}
      {view==='calendar'&&<CalendarView projects={projects} members={members} events={events} setEvents={setEvents} currentUser={currentUser} dayNotes={dayNotes} setDayNotes={setDayNotes} reminders={reminders} setReminders={setReminders}/>}
      {view==='members'&&<MembersView members={members} setMembers={setMembers}/>}

      {showSettings&&<SettingsModal gasUrl={gasUrl} setGasUrl={setGasUrl} autoSync={autoSync} setAutoSync={setAutoSync} onSave={saveUrl} onClose={()=>setShowSettings(false)}/>}
      {showUserMenu&&<div style={{position:'fixed',inset:0,zIndex:199}} onClick={()=>setShowUserMenu(false)}/>}
      {alertBanner&&(
        <div className="alert-banner">
          <span style={{fontSize:'18px',flexShrink:0}}>⏰</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,marginBottom:'2px'}}>แจ้งเตือน</div>
            <div>{alertBanner.text}</div>
          </div>
          <button onClick={()=>setAlertBanner(null)} style={{background:'none',border:'none',color:'#9ca3af',cursor:'pointer',padding:'0',fontSize:'16px'}}>✕</button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<PMDashboard/>);
</script>
</body>
</html>
