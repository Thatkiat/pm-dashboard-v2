<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM Command Center v2</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'IBM Plex Sans Thai',-apple-system,sans-serif;background:linear-gradient(135deg,#f0f4ff 0%,#e8edf8 100%);min-height:100vh;padding:16px;}
.container{max-width:1500px;margin:0 auto;}
h1{font-size:24px;color:#1f2937;font-weight:700;}
h3{font-size:15px;color:#1f2937;margin-bottom:8px;font-weight:600;}
h4{font-size:13px;color:#374151;margin-bottom:6px;font-weight:600;}

/* Header */
.header{background:white;padding:16px 20px;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:14px;border:1px solid #e5e7eb;}
.header-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
.subtitle{color:#6b7280;font-size:12px;margin-top:2px;}
.header-actions{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.sync-status{padding:5px 12px;border-radius:8px;font-size:11px;font-weight:600;margin-bottom:6px;display:inline-block;}
.sync-status.success{background:#d1fae5;color:#065f46;}
.sync-status.error{background:#fee2e2;color:#991b1b;}
.sync-status.loading{background:#dbeafe;color:#1e40af;}
.tabs{display:flex;gap:5px;flex-wrap:wrap;}
.tab-btn{padding:7px 13px;border:1px solid #d1d5db;background:white;cursor:pointer;font-weight:600;font-size:12px;color:#6b7280;border-radius:7px;transition:all .15s;font-family:inherit;}
.tab-btn.active{background:#1f2937;color:white;border-color:#1f2937;}
.tab-btn:hover:not(.active){background:#f3f4f6;}

/* User chip */
.user-chip{display:flex;align-items:center;gap:6px;background:#f3f4f6;border:1px solid #d1d5db;border-radius:20px;padding:4px 10px 4px 4px;cursor:pointer;font-size:12px;font-weight:600;}
.user-chip .mini-av{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;}

/* Buttons */
button{padding:7px 12px;border:none;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;font-family:inherit;}
.btn-primary{background:#1f2937;color:white;}
.btn-primary:hover{background:#111827;}
.btn-success{background:#10b981;color:white;}
.btn-success:hover{background:#059669;}
.btn-info{background:#3b82f6;color:white;}
.btn-info:hover{background:#2563eb;}
.btn-warning{background:#f59e0b;color:white;}
.btn-warning:hover{background:#d97706;}
.btn-danger{background:#ef4444;color:white;}
.btn-danger:hover{background:#dc2626;}
.btn-secondary{background:#6b7280;color:white;}
.btn-secondary:hover{background:#4b5563;}
.btn-purple{background:#8b5cf6;color:white;}
.btn-purple:hover{background:#7c3aed;}
.btn-outline{background:white;color:#374151;border:1px solid #d1d5db;}
.btn-outline:hover{background:#f9fafb;}
.btn-ghost{background:none;color:#6b7280;border:none;}
.btn-ghost:hover{background:#f3f4f6;}
.btn-sm{padding:4px 9px;font-size:11px;}
.btn-xs{padding:2px 6px;font-size:10px;}
button:disabled{opacity:.45;cursor:not-allowed;}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-top:12px;}
.stat-card{background:white;padding:12px;border-radius:10px;border:1px solid #e5e7eb;text-align:center;}
.stat-value{font-size:20px;font-weight:700;color:#1f2937;margin:4px 0;}
.stat-label{font-size:10px;color:#6b7280;text-transform:uppercase;font-weight:600;}

/* Cards */
.card{background:white;padding:14px;border-radius:12px;border:1px solid #e5e7eb;box-shadow:0 1px 3px rgba(0,0,0,.04);margin-bottom:12px;}

/* Forms */
.form-group{background:#f9fafb;padding:12px;border-radius:8px;margin:8px 0;border:1px solid #e5e7eb;}
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;}
label{display:block;font-size:11px;font-weight:600;color:#374151;margin-bottom:2px;}
input,select,textarea{width:100%;padding:6px 9px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;font-family:inherit;margin-bottom:0;}
input:focus,select:focus,textarea:focus{outline:none;border-color:#6366f1;box-shadow:0 0 0 2px rgba(99,102,241,.12);}
textarea{resize:vertical;min-height:54px;}

/* Table */
.table-wrap{background:white;border-radius:8px;border:1px solid #e5e7eb;overflow-x:auto;margin-top:8px;}
table{width:100%;border-collapse:collapse;font-size:11px;}
th{background:#f9fafb;padding:8px 9px;text-align:left;font-weight:600;color:#374151;border-bottom:1px solid #e5e7eb;white-space:nowrap;}
td{padding:7px 9px;border-bottom:1px solid #f3f4f6;vertical-align:middle;}
tr:hover td{background:#fafbff;}
tr:last-child td{border-bottom:none;}

/* Badges */
.level-badge{display:inline-block;padding:1px 5px;border-radius:4px;font-size:9px;font-weight:700;margin-right:3px;}
.level-0-badge{background:#dbeafe;color:#1e40af;}
.level-1-badge{background:#d1fae5;color:#065f46;}
.level-2-badge{background:#fef3c7;color:#92400e;}
.pri-high{background:#fee2e2;color:#991b1b;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600;}
.pri-normal{background:#dbeafe;color:#1e40af;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600;}
.pri-low{background:#f3f4f6;color:#6b7280;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600;}

/* Due alerts */
.due-alert{padding:2px 7px;border-radius:5px;font-size:10px;font-weight:600;border-left:3px solid;white-space:nowrap;}
.due-overdue{background:#fee2e2;color:#991b1b;border-left-color:#dc2626;}
.due-urgent{background:#fed7aa;color:#92400e;border-left-color:#f97316;}
.due-warning{background:#fef3c7;color:#78350f;border-left-color:#eab308;}
.due-ok{background:#d1fae5;color:#065f46;border-left-color:#10b981;}
.due-done{background:#e0e7ff;color:#3730a3;border-left-color:#6366f1;}

/* Progress */
.progress-bar{background:#e5e7eb;height:6px;border-radius:4px;overflow:hidden;}
.progress-fill{height:100%;transition:width .3s ease;}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:14px;}
.modal-box{background:white;padding:20px;border-radius:14px;width:100%;max-height:92vh;overflow-y:auto;}
.modal-box.sm{max-width:460px;}
.modal-box.md{max-width:660px;}
.modal-box.lg{max-width:880px;}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:#9ca3af;padding:2px;}

/* Comments */
.comment-item{background:#f9fafb;border-radius:7px;padding:9px;margin-bottom:6px;border-left:3px solid #6366f1;}

/* Gantt */
.gantt-wrap{background:white;padding:14px;border-radius:12px;border:1px solid #e5e7eb;overflow-x:auto;}
.gantt-row{display:grid;grid-template-columns:200px 1fr;gap:8px;margin-bottom:5px;align-items:center;min-height:28px;}
.gantt-label{font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.gantt-bar-cont{position:relative;height:24px;background:#f3f4f6;border-radius:4px;}
.gantt-bar{position:absolute;height:100%;border-radius:4px;display:flex;align-items:center;padding:0 5px;color:white;font-size:9px;font-weight:600;overflow:hidden;white-space:nowrap;min-width:4px;cursor:pointer;transition:all .15s;user-select:none;}
.gantt-bar:hover{opacity:.88;box-shadow:0 2px 8px rgba(0,0,0,.25);}
/* Bar context menu */
.bar-menu{position:fixed;background:white;border:1px solid #e5e7eb;border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,.15);z-index:500;padding:5px;min-width:180px;}
.bar-menu-title{padding:5px 10px 6px;font-size:10px;font-weight:700;color:#9ca3af;border-bottom:1px solid #f3f4f6;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:170px;}
.bar-menu-item{width:100%;text-align:left;padding:7px 10px;font-size:12px;display:flex;align-items:center;gap:8px;background:none;border:none;cursor:pointer;border-radius:6px;color:#374151;font-family:inherit;font-weight:500;min-height:unset;}
.bar-menu-item:hover{background:#f3f4f6;color:#1f2937;}
.bar-menu-item.danger:hover{background:#fee2e2;color:#991b1b;}
/* Note indicator on bar */
.bar-note-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#fbbf24;margin-right:3px;flex-shrink:0;}
.gantt-today-line{position:absolute;width:2px;top:0;height:100%;background:#ef4444;z-index:10;}
.gantt-proj-header{display:grid;grid-template-columns:200px 1fr;gap:8px;margin-bottom:3px;margin-top:10px;}
.gantt-month-row{position:relative;height:18px;}
.gantt-month-lbl{position:absolute;font-size:9px;color:#9ca3af;border-left:1px solid #e5e7eb;padding-left:2px;top:0;height:18px;line-height:18px;}

/* ── Timeline (Dashboard) ─────────────────────── */
.timeline-wrap{padding:6px 0;}
.tl-project-row{margin-bottom:20px;}
.tl-label{font-size:12px;font-weight:700;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;}
.tl-track{position:relative;height:20px;background:#e5e7eb;border-radius:10px;overflow:visible;}
.tl-fill{position:absolute;left:0;height:100%;border-radius:10px;opacity:.85;}
.tl-today{position:absolute;top:-4px;width:3px;height:28px;background:#ef4444;border-radius:2px;z-index:5;}
.tl-pin{position:absolute;top:50%;transform:translate(-50%,-50%);width:14px;height:14px;border-radius:50%;border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,.25);cursor:pointer;z-index:6;transition:transform .15s;}
.tl-pin:hover{transform:translate(-50%,-50%) scale(1.4);}
.tl-date-lbl{position:absolute;font-size:9px;color:#9ca3af;top:-14px;}
.tl-today-lbl{position:absolute;font-size:9px;color:#ef4444;font-weight:700;top:22px;transform:translateX(-50%);}

/* Tooltip */
.tooltip-box{position:fixed;background:#1f2937;color:white;padding:8px 12px;border-radius:8px;font-size:11px;z-index:9999;pointer-events:none;max-width:220px;line-height:1.55;box-shadow:0 4px 12px rgba(0,0,0,.25);}
.tooltip-box::before{content:'';position:absolute;top:8px;left:-6px;border-width:6px 6px 6px 0;border-style:solid;border-color:transparent #1f2937 transparent transparent;}

/* Calendar */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-day-name{text-align:center;font-size:10px;font-weight:700;color:#6b7280;padding:4px 0;}
.cal-cell{background:white;border:1px solid #e5e7eb;border-radius:6px;min-height:80px;padding:4px;font-size:11px;position:relative;overflow:hidden;}
.cal-cell.today{border-color:#6366f1;background:#fafbff;}
.cal-cell.other-month{background:#f9fafb;opacity:.6;}
.cal-date{font-weight:700;font-size:12px;margin-bottom:3px;color:#374151;}
.cal-cell.today .cal-date{color:#6366f1;}
.cal-chip{font-size:9px;padding:1px 5px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;display:block;}
.cal-chip:hover{opacity:.8;}
.cal-chip.event{background:#e0e7ff;color:#3730a3;}
.cal-add-btn{position:absolute;top:3px;right:3px;background:none;border:none;font-size:12px;color:#d1d5db;cursor:pointer;padding:0;line-height:1;}
.cal-add-btn:hover{color:#6366f1;}

/* Reminder badge on calendar cell */
.cal-reminder-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#f59e0b;position:absolute;top:4px;left:4px;}
/* Note badge on calendar cell */
.cal-note-dot{position:absolute;top:4px;left:13px;font-size:9px;line-height:1;opacity:.85;filter:saturate(1.2);}
.cal-cell{cursor:pointer;}
.cal-cell:hover{background:#f5f7ff;}
.cal-cell.today:hover{background:#f0eeff;}
/* Weekend & holiday colors */
.cal-cell.sat{background:#eff6ff;}
.cal-cell.sat:hover{background:#dbeafe;}
.cal-cell.sat .cal-date{color:#2563eb;}
.cal-cell.sun{background:#fff1f2;}
.cal-cell.sun:hover{background:#ffe4e6;}
.cal-cell.sun .cal-date{color:#e11d48;}
.cal-cell.holiday{background:#fffbeb;}
.cal-cell.holiday:hover{background:#fef3c7;}
.cal-cell.holiday .cal-date{color:#b45309;}
.cal-cell.sat.other-month,.cal-cell.sun.other-month,.cal-cell.holiday.other-month{opacity:.45;}
.cal-holiday-name{font-size:8px;color:#b45309;font-weight:600;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;background:#fde68a;border-radius:2px;padding:0 3px;}
/* Day detail section headers */
.day-section-hdr{font-size:11px;font-weight:700;color:#374151;padding:6px 0 4px;border-bottom:1px solid #f3f4f6;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;}
/* Reminder item */
.reminder-item{display:flex;justify-content:space-between;align-items:center;padding:5px 8px;border-radius:6px;margin-bottom:3px;border:1px solid;}
.reminder-item.pending{background:#fffbeb;border-color:#fcd34d;}
.reminder-item.done{background:#f3f4f6;border-color:#e5e7eb;}
/* In-app alert banner */
.alert-banner{position:fixed;top:16px;right:16px;z-index:9999;background:#1f2937;color:white;padding:12px 16px;border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,.25);max-width:300px;font-size:12px;display:flex;gap:10px;align-items:flex-start;animation:slideIn .3s ease;}
@keyframes slideIn{from{opacity:0;transform:translateX(30px);}to{opacity:1;transform:translateX(0);}}
/* Workload */
.workload-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-top:12px;}
.workload-card{background:white;padding:14px;border-radius:12px;border:1px solid #e5e7eb;}
.avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0;}

/* Section header */
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:6px;}
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;align-items:center;}
.filter-bar input,.filter-bar select{margin-bottom:0;flex:1;min-width:110px;}

/* Info box */
.info-box{background:#eff6ff;color:#1e40af;padding:10px;border-radius:8px;font-size:11px;margin:8px 0;line-height:1.7;}
.info-box ol{margin-left:16px;margin-top:4px;}
.info-box code{background:rgba(0,0,0,.07);padding:1px 4px;border-radius:3px;font-size:10px;}

.empty{text-align:center;padding:32px 16px;color:#9ca3af;font-size:12px;}
.fade-in{animation:fi .2s ease;}
@keyframes fi{from{opacity:0;transform:translateY(3px);}to{opacity:1;transform:translateY(0);}}

/* Today section on dashboard */
.today-section{background:linear-gradient(135deg,#f5f3ff,#ede9fe);border:1px solid #c4b5fd;border-radius:12px;padding:14px;margin-bottom:14px;}
.today-item{display:flex;gap:8px;align-items:flex-start;padding:7px;background:white;border-radius:8px;margin-bottom:5px;}
.today-time{font-size:11px;font-weight:700;color:#6366f1;min-width:40px;}
.today-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px;}

/* Event type colors */
.ev-meeting{background:#dbeafe;color:#1e40af;}
.ev-appointment{background:#fce7f3;color:#9d174d;}
.ev-activity{background:#d1fae5;color:#065f46;}

/* Range inputs for Gantt */
.gantt-range-bar{display:flex;align-items:center;gap:8px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:8px 12px;margin-bottom:12px;flex-wrap:wrap;}
.gantt-range-bar label{margin-bottom:0;white-space:nowrap;}
.gantt-range-bar input[type=date]{max-width:140px;flex:0 0 auto;}

@media(max-width:768px){
  body{padding:8px;}
  .form-row{grid-template-columns:1fr;}
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .gantt-row{grid-template-columns:90px 1fr;}
  .gantt-label{font-size:9px;}
  .cal-cell{min-height:52px;padding:2px;}
  .cal-chip{font-size:8px;padding:1px 3px;}
  .header{padding:12px 14px;}
  h1{font-size:18px;}
  .tabs{gap:3px;}
  .tab-btn{padding:6px 9px;font-size:11px;}
  .workload-grid{grid-template-columns:1fr;}
  .gantt-range-bar{padding:6px 10px;}
  /* Touch targets */
  button{min-height:34px;}
  .btn-xs{min-height:28px;}
  .cal-add-btn{min-height:20px;}
  /* Hide some columns on mobile */
  .mobile-hide{display:none!important;}
}
@media(max-width:480px){
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .tl-date-lbl{display:none;}
  .gantt-month-lbl{font-size:8px;}
  h1{font-size:16px;}
  .tab-btn{padding:5px 7px;font-size:10px;}
}
@media print{
  body{padding:0;background:white;}
  .header-actions,.tabs,.no-print,button{display:none!important;}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

// ── UTILS ───────────────────────────────────────────────
const genId = () => Date.now() + Math.floor(Math.random()*9999);
const todayDate = () => { const d=new Date(); d.setHours(0,0,0,0); return d; };
const toDate = s => { if(!s) return new Date(0); const d=new Date(s); d.setHours(0,0,0,0); return d; };
const ymd = d => { const dt=new Date(d); return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`; };
const fmt = (s,opts={year:'numeric',month:'short',day:'numeric'}) => { try{ return new Date(s).toLocaleDateString('th-TH',opts); }catch{ return s||''; } };
const daysLeft = due => { if(!due) return 999; return Math.ceil((toDate(due)-todayDate())/86400000); };
const getDueStatus = task => {
  if(task.status==='เสร็จสิ้น') return {cls:'due-done',text:'✅ เสร็จสิ้น',color:'#6366f1'};
  const d=daysLeft(task.dueDate);
  if(d<0) return {cls:'due-overdue',text:`⚠️ เกิน ${Math.abs(d)} วัน`,color:'#ef4444'};
  if(d===0) return {cls:'due-overdue',text:'🔴 ครบกำหนดวันนี้',color:'#ef4444'};
  if(d<=3) return {cls:'due-urgent',text:`🟠 เหลือ ${d} วัน`,color:'#f97316'};
  if(d<=7) return {cls:'due-warning',text:`🟡 เหลือ ${d} วัน`,color:'#eab308'};
  return {cls:'due-ok',text:`🟢 เหลือ ${d} วัน`,color:'#10b981'};
};
const calcProgress = tasks => { if(!tasks||!tasks.length) return 0; return Math.round(tasks.filter(t=>t.status==='เสร็จสิ้น').length/tasks.length*100); };

// ── THAI PUBLIC HOLIDAYS ─────────────────────────────────
const THAI_HOLIDAYS = {
  // 2025
  '2025-01-01':'วันขึ้นปีใหม่','2025-02-26':'วันมาฆบูชา',
  '2025-04-06':'วันจักรี','2025-04-13':'วันสงกรานต์',
  '2025-04-14':'วันสงกรานต์','2025-04-15':'วันสงกรานต์',
  '2025-05-01':'วันแรงงานแห่งชาติ','2025-05-12':'วันวิสาขบูชา',
  '2025-06-03':'วันเฉลิมพระชนมพรรษา ร.10','2025-07-10':'วันอาสาฬหบูชา',
  '2025-07-11':'วันเข้าพรรษา','2025-07-28':'วันเฉลิมพระชนมพรรษา ร.10',
  '2025-08-12':'วันแม่แห่งชาติ','2025-10-13':'วันนวมินทรมหาราช',
  '2025-10-23':'วันปิยมหาราช','2025-12-05':'วันพ่อแห่งชาติ',
  '2025-12-10':'วันรัฐธรรมนูญ','2025-12-31':'วันสิ้นปี',
  // 2026

// ── EXCEL DATE PARSER ────────────────────────────────────
// แก้ปัญหาวันที่เพี้ยนจากการ Import Excel
// รองรับ: Excel serial number, JS Date, ISO string,
//         DD/MM/YYYY (พ.ศ./ค.ศ.), MM/DD/YYYY, DD-MM-YYYY
const parseExcelDate = v => {
  if(v === null || v === undefined || v === '') return '';
  // ── JS Date object (เกิดจาก cellDates:true) ──
  // ใช้ UTC methods ป้องกันวันที่ลบ 1 วัน เมื่อ SheetJS คืน Date ที่ UTC midnight
  if(v instanceof Date) {
    if(isNaN(v.getTime())) return '';
    const y = v.getUTCFullYear();
    const m = String(v.getUTCMonth()+1).padStart(2,'0');
    const d = String(v.getUTCDate()).padStart(2,'0');
    return `${y}-${m}-${d}`;
  }
  // ── Excel serial number (ตัวเลข เช่น 46300) ──
  if(typeof v === 'number') {
    if(v < 1) return '';
    // Excel epoch = 1 Jan 1900; Unix epoch offset = 25569 days
    // ms คำนวณจาก UTC epoch → ต้องใช้ UTC methods เช่นกัน
    const ms = (v - 25569) * 86400 * 1000;
    const d = new Date(ms);
    if(isNaN(d.getTime())) return '';
    const y = d.getUTCFullYear();
    const mo = String(d.getUTCMonth()+1).padStart(2,'0');
    const day = String(d.getUTCDate()).padStart(2,'0');
    return `${y}-${mo}-${day}`;
  }
  // ── String ──
  if(typeof v === 'string') {
    const s = v.trim();
    if(!s) return '';
    // YYYY-MM-DD หรือ YYYY/MM/DD (ค.ศ.)
    const isoMatch = s.match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})$/);
    if(isoMatch) {
      let [,y,m,d] = isoMatch;
      if(Number(y) > 2400) y = String(Number(y) - 543); // พ.ศ. → ค.ศ.
      return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
    }
    // DD/MM/YYYY หรือ DD-MM-YYYY (รูปแบบไทย/ยุโรป)
    const dmyMatch = s.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{4})$/);
    if(dmyMatch) {
      let [,d,m,y] = dmyMatch;
      if(Number(y) > 2400) y = String(Number(y) - 543); // พ.ศ. → ค.ศ.
      return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
    }
    // MM/DD/YYYY (รูปแบบ US — ถ้าส่วน "เดือน" > 12 ให้ถือว่าเป็นวัน)
    const mdyMatch = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if(mdyMatch) {
      let [,a,b,y] = mdyMatch;
      if(Number(y) > 2400) y = String(Number(y) - 543);
      // ถ้า a > 12 แสดงว่า a คือวัน (DD/MM)
      const [day,mon] = Number(a)>12 ? [a,b] : [b,a];
      return `${y}-${mon.padStart(2,'0')}-${day.padStart(2,'0')}`;
    }
    // พยายาม parse ทั่วไปเป็น fallback
    const fallback = new Date(s);
    if(!isNaN(fallback.getTime())) return ymd(fallback);
    return s; // คืนต้นฉบับถ้าแปลงไม่ได้
  }
  return '';
};

function Modal({show,onClose,title,size='md',children}){
  if(!show) return null;
  return(
    <div className="modal-overlay" onClick={e=>e.target.className==='modal-overlay'&&onClose()}>
      <div className={`modal-box ${size} fade-in`}>
        <div className="modal-header"><h3 style={{margin:0}}>{title}</h3><button className="modal-close" onClick={onClose}>✕</button></div>
        {children}
      </div>
    </div>
  );
}
function LevelBadge({level}){
  if(level===0) return <span className="level-badge level-0-badge">หลัก</span>;
  if(level===1) return <span className="level-badge level-1-badge">รอง</span>;
  return <span className="level-badge level-2-badge">ย่อย</span>;
}
function PriBadge({p}){
  if(p==='สูง') return <span className="pri-high">สูง</span>;
  if(p==='ต่ำ') return <span className="pri-low">ต่ำ</span>;
  return <span className="pri-normal">ปกติ</span>;
}

              onChange={e=>setF({...f,emailNotify:e.target.checked})}
              style={{width:'auto',marginBottom:0,accentColor:'#10b981',cursor:'pointer'}}/>
            <label htmlFor="emNotify" style={{marginBottom:0,fontSize:'12px',fontWeight:600,color:'#065f46',textTransform:'none',cursor:'pointer'}}>
              📧 แจ้งเตือนทาง Email ก่อนถึงเวลา
            </label>
            <button onClick={()=>setShowEmailGuide(v=>!v)} style={{marginLeft:'auto',background:'none',border:'none',color:'#6b7280',fontSize:'11px',cursor:'pointer',padding:'0',minHeight:'unset',fontWeight:600}}>
              {showEmailGuide?'▲ ซ่อน':'ℹ️ วิธีตั้งค่า'}
            </button>
          </div>

          {f.emailNotify&&(
            <div style={{display:'flex',flexDirection:'column',gap:'7px'}}>
              <div className="form-row">
                <div>
                  <label style={{color:'#065f46'}}>⏱️ แจ้งเตือนก่อน</label>
                  <select value={f.notifyBefore||30} onChange={e=>setF({...f,notifyBefore:Number(e.target.value)})} style={{borderColor:'#6ee7b7'}}>
                    <option value={1}>1 นาที (ทดสอบ)</option>
                    <option value={10}>10 นาที</option>
                    <option value={15}>15 นาที</option>
                    <option value={30}>30 นาที</option>
                    <option value={60}>1 ชั่วโมง</option>
                    <option value={120}>2 ชั่วโมง</option>
                    <option value={1440}>1 วัน</option>
                  </select>
                </div>
                <div>
                  <label style={{color:'#065f46'}}>
                    📬 Email ปลายทาง
                    {attendeeEmails&&<span style={{fontWeight:400,marginLeft:'4px',fontSize:'9px',color:'#10b981'}}>(ดึงจากสมาชิก)</span>}
                  </label>
                  <input
                    value={f.notifyEmails||attendeeEmails}
                    onChange={e=>setF({...f,notifyEmails:e.target.value})}
                    placeholder="email1@..., email2@..."
                    style={{borderColor:'#6ee7b7',fontSize:'11px'}}/>
                </div>
              </div>
              <div style={{fontSize:'10px',color:'#065f46',background:'#dcfce7',padding:'5px 8px',borderRadius:'5px',lineHeight:'1.55'}}>
                ✅ ข้อมูลการแจ้งเตือนจะถูกบันทึกลง Google Sheets — GAS Script จะส่ง email อัตโนมัติ
              </div>
            </div>
          )}

          {showEmailGuide&&(
            <div style={{marginTop:'8px',padding:'9px 10px',background:'#fffbeb',border:'1px solid #fde68a',borderRadius:'7px',fontSize:'11px',color:'#78350f',lineHeight:'1.65'}}>
              <strong>📌 วิธีตั้งค่าส่ง Email อัตโนมัติจาก GAS:</strong>
              <ol style={{margin:'5px 0 0 14px',padding:0,display:'flex',flexDirection:'column',gap:'3px'}}>
                <li>เปิด GAS Script → เพิ่มโค้ดฟังก์ชัน <code style={{background:'rgba(0,0,0,.07)',padding:'1px 4px',borderRadius:'3px'}}>sendEventReminders()</code> จากไฟล์ <code style={{background:'rgba(0,0,0,.07)',padding:'1px 4px',borderRadius:'3px'}}>google-apps-script-v2.gs</code></li>
                <li>ใน GAS Script Editor กดเมนู <strong>Triggers (นาฬิกา)</strong></li>
                <li>Add Trigger → Function: <code style={{background:'rgba(0,0,0,.07)',padding:'1px 4px',borderRadius:'3px'}}>sendEventReminders</code> → Time-driven → Every 15 minutes</li>
                <li>GAS จะตรวจ events ที่มีการแจ้งเตือน และ send email ให้อัตโนมัติก่อนถึงเวลา</li>
              </ol>
              <div style={{marginTop:'5px',color:'#92400e'}}>💡 GAS ใช้ <code style={{background:'rgba(0,0,0,.07)',padding:'1px 4px',borderRadius:'3px'}}>MailApp.sendEmail()</code> ส่งได้ฟรี ~100 email/วัน</div>
            </div>
          )}
        </div>

      </div>
      <div style={{display:'flex',gap:'6px',marginTop:'12px'}}>
        <button className="btn-success" onClick={()=>{ if(!f.title){alert('กรุณากรอกหัวข้อ');return;} onSave(f); }}>บันทึก</button>
        <button className="btn-secondary" onClick={onClose}>ยกเลิก</button>
      </div>
    </Modal>
  );
}

// ── MEMBERS VIEW ─────────────────────────────────────────
function MembersView({members,setMembers}){
  const [showForm,setShowForm]=useState(false);
  const [edit,setEdit]=useState(null);
  const [f,setF]=useState({name:'',email:'',role:''});
  const openAdd=()=>{ setF({name:'',email:'',role:''}); setEdit(null); setShowForm(true); };
  const openEdit=m=>{ setF({...m}); setEdit(m); setShowForm(true); };
  const save=()=>{ if(!f.name){alert('กรุณากรอกชื่อ');return;} if(edit){setMembers(members.map(m=>m.id===edit.id?{...m,...f}:m));}else{setMembers([...members,{...f,id:genId()}]);} setShowForm(false); };
  return(
    <div className="fade-in">
      <div className="section-header">
        <h3>👤 ทีมงาน ({members.length} คน)</h3>
        <button className="btn-success" onClick={openAdd}>➕ เพิ่มสมาชิก</button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(230px,1fr))',gap:'10px'}}>
        {members.map(m=>(
          <div key={m.id} className="card" style={{display:'flex',gap:'10px',alignItems:'center',padding:'12px'}}>
            <div className="avatar">{m.name.charAt(0)}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:700,fontSize:'13px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{m.name}</div>
              <div style={{fontSize:'11px',color:'#6b7280'}}>{m.role||'ทีมงาน'}</div>
              <div style={{fontSize:'10px',color:'#6366f1',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{m.email}</div>
            </div>
            <div style={{display:'flex',gap:'3px',flexDirection:'column'}}>
              <button className="btn-outline btn-xs" onClick={()=>openEdit(m)}>✏️</button>
              <button className="btn-danger btn-xs" onClick={()=>{ if(window.confirm('ลบสมาชิก?')) setMembers(members.filter(x=>x.id!==m.id)); }}>🗑️</button>
            </div>
          </div>
        ))}
        {!members.length&&<div className="empty">ยังไม่มีสมาชิก</div>}
      </div>
      {showForm&&(
        <Modal show onClose={()=>setShowForm(false)} title={edit?'✏️ แก้ไขสมาชิก':'➕ เพิ่มสมาชิก'} size="sm">
          <div style={{display:'flex',flexDirection:'column',gap:'7px'}}>
            <div><label>ชื่อ *</label><input value={f.name} onChange={e=>setF({...f,name:e.target.value})}/></div>
            <div><label>อีเมล</label><input type="email" value={f.email} onChange={e=>setF({...f,email:e.target.value})}/></div>
            <div><label>ตำแหน่ง</label><input value={f.role} onChange={e=>setF({...f,role:e.target.value})}/></div>
          </div>
          <div style={{display:'flex',gap:'6px',marginTop:'12px'}}>
            <button className="btn-success" onClick={save}>บันทึก</button>
            <button className="btn-secondary" onClick={()=>setShowForm(false)}>ยกเลิก</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── PROJECTS VIEW ─────────────────────────────────────────
function ProjectsView({projects,setProjects,members}){
  const [showPF,setShowPF]=useState(false);
  const [editP,setEditP]=useState(null);
  const [taskModal,setTaskModal]=useState(null); // {projId, initial}
  const [commentState,setCommentState]=useState(null); // {projId, task}
  const [noteModal,setNoteModal]=useState(null); // {projId, taskId, notes}
  const [collapsed,setCollapsed]=useState({});
  const [search,setSearch]=useState('');
  const [fLevel,setFLevel]=useState('all');
  const [fStatus,setFStatus]=useState('all');
  const fileRef=useRef();

  const saveProj=f=>{ if(editP){setProjects(projects.map(p=>p.id===editP.id?{...p,...f}:p));}else{setProjects([...projects,{...f,id:genId(),tasks:[]}]);} setShowPF(false);setEditP(null); };
  const delProj=id=>{ if(window.confirm('ลบโครงการนี้?')) setProjects(projects.filter(p=>p.id!==id)); };

  const saveTask=f=>{
    const {projId,initial}=taskModal;
    setProjects(projects.map(p=>{ if(p.id!==projId) return p;
      if(initial&&initial.id){ return {...p,tasks:p.tasks.map(t=>t.id===initial.id?{...t,...f,comments:t.comments||[],notes:f.notes||''}:t)}; }
      return {...p,tasks:[...p.tasks,{...f,id:genId(),comments:[],notes:f.notes||''}]};
    }));
    setTaskModal(null);
  };
  const delTask=(pid,tid)=>{ if(window.confirm('ลบกิจกรรม?')) setProjects(projects.map(p=>p.id===pid?{...p,tasks:p.tasks.filter(t=>t.id!==tid&&t.parentId!==tid)}:p)); };
  const updateStatus=(pid,tid,s)=>setProjects(projects.map(p=>p.id===pid?{...p,tasks:p.tasks.map(t=>t.id===tid?{...t,status:s}:t)}:p));
  const addComment=(taskId,c)=>setProjects(projects.map(p=>p.id===commentState.projId?{...p,tasks:p.tasks.map(t=>t.id===taskId?{...t,comments:[...(t.comments||[]),c]}:t)}:p));
  const saveNote=()=>{ if(!noteModal) return; setProjects(projects.map(p=>p.id!==noteModal.projId?p:{...p,tasks:p.tasks.map(t=>t.id!==noteModal.taskId?t:{...t,notes:noteModal.notes})})); setNoteModal(null); };

  const exportAll=()=>{
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([['ID','ชื่อโครงการ','รายละเอียด','วันเริ่ม','วันสิ้นสุด'],...projects.map(p=>[p.id,p.name,p.description,p.startDate,p.endDate])]),'Projects');
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([['Task ID','Project ID','ชื่อกิจกรรม','ระดับ','Parent ID','ผู้รับผิดชอบ','วันเริ่ม','วันส่ง','ความสำคัญ','สถานะ'],...projects.flatMap(p=>p.tasks.map(t=>[t.id,p.id,t.name,t.level,t.parentId||'',t.assignee,t.startDate,t.dueDate,t.priority,t.status]))]),'Tasks');
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([['ID','ชื่อ','อีเมล','ตำแหน่ง'],...members.map(m=>[m.id,m.name,m.email,m.role])]),'Members');
    XLSX.writeFile(wb,'PM_Export.xlsx');
  };
  const importExcel=e=>{
    const file=e.target.files[0]; if(!file) return;
    const r=new FileReader(); r.onload=ev=>{
      try{
        // cellDates:true → SheetJS คืน JS Date object แทน serial number
        // raw:true (default) → ดึงค่าดิบ ไม่ผ่าน format เพื่อให้ parseExcelDate จัดการเอง
        const wb=XLSX.read(ev.target.result,{type:'binary',cellDates:true});
        const pr=XLSX.utils.sheet_to_json(wb.Sheets['Projects'],{header:1}).slice(1);
        const tr=XLSX.utils.sheet_to_json(wb.Sheets['Tasks'],{header:1}).slice(1);
        const newP=pr.filter(r=>r[0]&&r[1]).map(r=>({
          id:Number(r[0])||genId(),
          name:String(r[1]),
          description:String(r[2]||''),
          startDate:parseExcelDate(r[3]),
          endDate:parseExcelDate(r[4]),
          color:'#6366f1',tasks:[],
        }));
        tr.filter(r=>r[0]).forEach(r=>{
          const p=newP.find(p=>p.id===Number(r[1]));
          if(p) p.tasks.push({
            id:Number(r[0])||genId(),
            name:String(r[2]),
            level:Number(r[3])||0,
            parentId:r[4]&&r[4]!==''?Number(r[4]):null,
            description:'',
            assignee:String(r[5]||''),
            startDate:parseExcelDate(r[6]),
            dueDate:parseExcelDate(r[7]),
            priority:String(r[8]||'ปกติ'),
            status:String(r[9]||'รอดำเนินการ'),
            comments:[],notes:'',
          });
        });
        const newCount=newP.filter(np=>!projects.some(p=>p.id===np.id)).length;
        const updateCount=newP.filter(np=>projects.some(p=>p.id===np.id)).length;
        const msg=`สรุปการนำเข้า:\n• โครงการใหม่ที่จะเพิ่ม: ${newCount} โครงการ\n• โครงการเดิมที่จะอัปเดต: ${updateCount} โครงการ\n• โครงการที่ไม่อยู่ใน Excel: คงเดิม (ไม่ถูกลบ)\n\nดำเนินการต่อ?`;
        if(window.confirm(msg)){
          setProjects(prev=>{
            // เก็บโครงการที่ไม่ได้อยู่ใน Excel ไว้ก่อน
            const kept=prev.filter(p=>!newP.some(np=>np.id===p.id));
            // newP: โครงการใหม่ + โครงการที่อัปเดต (แต่คง color เดิมถ้ามี)
            const merged=newP.map(np=>{
              const existing=prev.find(p=>p.id===np.id);
              return existing ? {...np, color:existing.color} : np;
            });
            return [...kept,...merged];
          });
        }
      }catch(err){alert('อ่านไฟล์ไม่ได้: '+err.message);}
    }; r.readAsBinaryString(file); e.target.value='';
  };

  return(
    <div className="fade-in">
      <div className="section-header">
        <h3>📁 โครงการทั้งหมด ({projects.length})</h3>
        <div style={{display:'flex',gap:'5px',flexWrap:'wrap'}}>
          <button className="btn-success" onClick={()=>{setEditP(null);setShowPF(true);}}>➕ โครงการ</button>
          <button className="btn-info" onClick={exportAll}>📤 Export</button>
          <button className="btn-warning" onClick={()=>fileRef.current.click()}>📥 Import</button>
          <button className="btn-outline" onClick={()=>window.print()}>🖨️ Print</button>
          <input ref={fileRef} type="file" accept=".xlsx,.xls" style={{display:'none'}} onChange={importExcel}/>
        </div>
      </div>
      <div className="filter-bar">
        <input style={{maxWidth:'200px'}} value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 ค้นหา..."/>
        <select style={{maxWidth:'130px'}} value={fLevel} onChange={e=>setFLevel(e.target.value)}>
          <option value="all">ทุกระดับ</option><option value="0">📌 หลัก</option><option value="1">📎 รอง</option><option value="2">📍 ย่อย</option>
        </select>
        <select style={{maxWidth:'140px'}} value={fStatus} onChange={e=>setFStatus(e.target.value)}>
          <option value="all">ทุกสถานะ</option><option value="รอดำเนินการ">รอดำเนินการ</option><option value="ในการทำงาน">ในการทำงาน</option><option value="เสร็จสิ้น">เสร็จสิ้น</option>
        </select>
      </div>

      {projects.map(proj=>{
        const filtered=proj.tasks.filter(t=>{
          const ms=!search||t.name.toLowerCase().includes(search.toLowerCase())||t.assignee.toLowerCase().includes(search.toLowerCase());
          const ml=fLevel==='all'||String(t.level)===fLevel;
          const ms2=fStatus==='all'||t.status===fStatus;
          return ms&&ml&&ms2;
        });
        const prog=calcProgress(proj.tasks);
        return(
          <div key={proj.id} className="card" style={{borderLeft:`4px solid ${proj.color}`}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:'6px',marginBottom:'8px'}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',alignItems:'center',gap:'7px'}}>
                  <button className="btn-ghost btn-xs" onClick={()=>setCollapsed(c=>({...c,[proj.id]:!c[proj.id]}))}>{collapsed[proj.id]?'▶':'▼'}</button>
                  <span style={{fontWeight:700,fontSize:'14px',color:proj.color}}>{proj.name}</span>
                </div>
                <div style={{fontSize:'11px',color:'#6b7280',marginLeft:'22px'}}>{proj.description} • {fmt(proj.startDate)} – {fmt(proj.endDate)}</div>
              </div>
              <div style={{display:'flex',gap:'3px'}}>
                <button className="btn-outline btn-xs" onClick={()=>{setEditP(proj);setShowPF(true);}}>✏️</button>
                <button className="btn-danger btn-xs" onClick={()=>delProj(proj.id)}>🗑️</button>
              </div>
            </div>
            <div style={{marginLeft:'22px',marginBottom:'8px'}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:'10px',color:'#6b7280',marginBottom:'2px'}}>
                <span>{proj.tasks.length} กิจกรรม • {proj.tasks.filter(t=>t.status==='เสร็จสิ้น').length} เสร็จ</span><span>{prog}%</span>
              </div>
              <div className="progress-bar"><div className="progress-fill" style={{width:`${prog}%`,background:proj.color}}/></div>
            </div>
            {!collapsed[proj.id]&&(
              <>
                {filtered.length>0?(
                  <div className="table-wrap" style={{marginLeft:'22px'}}>
                    <table><thead><tr>
                      <th>ระดับ</th><th>กิจกรรม</th><th>ผู้รับผิดชอบ</th><th>วันเริ่ม</th><th>วันส่ง</th><th>สำคัญ</th><th>สถานะ</th><th>กำหนดส่ง</th><th>จัดการ</th>
                    </tr></thead><tbody>
                      {filtered.map(task=>{
                        const ds=getDueStatus(task);
                        return(
                          <tr key={task.id} style={{background:task.level===0?'#fafbff':task.level===1?'#fafffe':'white'}}>
                            <td><LevelBadge level={task.level}/></td>
                            <td style={{paddingLeft:`${8+task.level*14}px`}}>
                              <span style={{fontWeight:task.level===0?700:task.level===1?600:400}}>{task.name}</span>
                              {task.comments&&task.comments.length>0&&<span style={{marginLeft:'4px',fontSize:'9px',color:'#6366f1'}}>💬{task.comments.length}</span>}
                              {task.notes&&<span title={task.notes} style={{marginLeft:'3px',fontSize:'9px',cursor:'help'}}>📝</span>}
                            </td>
                            <td>{task.assignee}</td>
                            <td>{fmt(task.startDate,{month:'short',day:'numeric'})}</td>
                            <td>{fmt(task.dueDate,{month:'short',day:'numeric'})}</td>
                            <td><PriBadge p={task.priority}/></td>
                            <td><select value={task.status} onChange={e=>updateStatus(proj.id,task.id,e.target.value)} style={{padding:'2px 5px',fontSize:'10px',marginBottom:0,minWidth:'90px'}}>
                              <option>รอดำเนินการ</option><option>ในการทำงาน</option><option>เสร็จสิ้น</option>
                            </select></td>
                            <td><span className={`due-alert ${ds.cls}`}>{ds.text}</span></td>
                            <td>
                              <div style={{display:'flex',gap:'2px',flexWrap:'nowrap'}}>
                                <button className="btn-outline btn-xs" title={task.notes||'เพิ่มโน๊ต'} onClick={()=>setNoteModal({projId:proj.id,taskId:task.id,notes:task.notes||''})}>📝</button>
                                <button className="btn-outline btn-xs" onClick={()=>setCommentState({projId:proj.id,task})}>💬</button>
                                <button className="btn-outline btn-xs" onClick={()=>setTaskModal({projId:proj.id,initial:task})}>✏️</button>
                                <button className="btn-danger btn-xs" onClick={()=>delTask(proj.id,task.id)}>🗑️</button>
                                {task.level<2&&<button className="btn-info btn-xs" title="เพิ่มกิจกรรมลูก" onClick={()=>setTaskModal({projId:proj.id,initial:{name:'',description:'',notes:'',level:task.level+1,parentId:task.id,assignee:members[0]?.name||'',startDate:TODAY,dueDate:'',priority:'ปกติ',status:'รอดำเนินการ'}})}>+เพิ่ม</button>}
                              </div>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody></table>
                  </div>
                ):<div style={{marginLeft:'22px',fontSize:'11px',color:'#9ca3af',padding:'8px'}}>{search||fLevel!=='all'||fStatus!=='all'?'ไม่พบกิจกรรมที่ค้นหา':'ยังไม่มีกิจกรรม'}</div>}
                <button className="btn-primary btn-sm" onClick={()=>setTaskModal({projId:proj.id,initial:null})} style={{marginLeft:'22px',marginTop:'6px'}}>➕ เพิ่มกิจกรรม</button>
              </>
            )}
          </div>
        );
      })}
      {!projects.length&&<div className="empty">ยังไม่มีโครงการ — กด "เพิ่มโครงการ" เพื่อเริ่ม</div>}

      {showPF&&<ProjectForm initial={editP} onSave={saveProj} onClose={()=>{setShowPF(false);setEditP(null);}}/>}
      {taskModal&&<TaskForm initial={taskModal.initial} projectId={taskModal.projId} projects={projects} members={members} onSave={saveTask} onClose={()=>setTaskModal(null)}/>}
      {commentState&&<CommentsPanel task={commentState.task} members={members} onAdd={(taskId,c)=>addComment(taskId,c)} onClose={()=>setCommentState(null)}/>}
      {noteModal&&(
        <Modal show onClose={()=>setNoteModal(null)} title="📝 โน๊ตกิจกรรม" size="sm">
          <textarea rows={5} value={noteModal.notes} onChange={e=>setNoteModal({...noteModal,notes:e.target.value})} placeholder="บันทึกโน๊ตภายใน เช่น ข้อควรระวัง, ลิงก์อ้างอิง, ข้อตกลง..."/>
          <div style={{display:'flex',gap:'6px',marginTop:'8px'}}>
            <button className="btn-success" onClick={saveNote}>💾 บันทึก</button>
            <button className="btn-secondary" onClick={()=>setNoteModal(null)}>ยกเลิก</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── GANTT VIEW ────────────────────────────────────────────
function GanttView({projects,setProjects,members}){
  const allDates=projects.flatMap(p=>p.tasks.flatMap(t=>[t.startDate,t.dueDate].filter(Boolean)));
  const globalMin=allDates.length?allDates.reduce((a,b)=>a<b?a:b):'2026-01-01';
  const globalMax=allDates.length?allDates.reduce((a,b)=>a>b?a:b):'2026-12-31';

  const [rangeStart,setRangeStart]=useState(()=>{ const d=new Date(globalMin); d.setDate(d.getDate()-3); return ymd(d); });
  const [rangeEnd,setRangeEnd]=useState(()=>{ const d=new Date(globalMax); d.setDate(d.getDate()+3); return ymd(d); });
  const [selProj,setSelProj]=useState('all');
  const [levelFilter,setLevelFilter]=useState('all');
  const [taskModal,setTaskModal]=useState(null); // {projId, initial, parentTask}
  const [barMenu,setBarMenu]=useState(null);     // {task, proj, x, y}
  const [noteModal,setNoteModal]=useState(null); // {projId, taskId, notes}
  const [tooltip,setTooltip]=useState(null);
  const [collapsedTasks,setCollapsedTasks]=useState(new Set());

  const min=toDate(rangeStart); const max=toDate(rangeEnd);
  const totalMs=Math.max(1,max-min);
  const pct=d=>Math.max(0,Math.min(100,(toDate(d)-min)/totalMs*100));
  const todayPct=pct(todayDate());

  // เรียง task ให้กิจกรรมลูกอยู่ใต้พ่อแม่ทันที
  const sortHierarchically=(tasks)=>{
    const byId={}; tasks.forEach(t=>byId[t.id]=t);
    const result=[]; const visited=new Set();
    const add=(t)=>{ if(visited.has(t.id))return; visited.add(t.id); result.push(t); tasks.filter(c=>c.parentId===t.id).forEach(c=>add(c)); };
    tasks.filter(t=>!t.parentId||!byId[t.parentId]).forEach(t=>add(t));
    // เพิ่มที่เหลือ (กรณี orphan)
    tasks.forEach(t=>{ if(!visited.has(t.id)){ visited.add(t.id); result.push(t); } });
    return result;
  };
  const toggleCollapse=(id)=>setCollapsedTasks(prev=>{ const s=new Set(prev); s.has(id)?s.delete(id):s.add(id); return s; });
  const isTaskVisible=(t,allTasks)=>{
    let cur=t;
    while(cur.parentId){ if(collapsedTasks.has(cur.parentId)) return false; cur=allTasks.find(p=>p.id===cur.parentId)||{}; if(!cur.id) break; }
    return true;
  };

  // Month labels
  const months=[];
  let cur=new Date(min.getFullYear(),min.getMonth(),1);
  while(cur<=max){
    months.push({label:cur.toLocaleDateString('th-TH',{month:'short',year:'2-digit'}),pct:pct(cur)});
    cur=new Date(cur.getFullYear(),cur.getMonth()+1,1);
  }

  const visible=selProj==='all'?projects:projects.filter(p=>p.id===Number(selProj));

  // Close bar menu on outside click
  const barMenuRef=useRef();
  useEffect(()=>{
    if(!barMenu) return;
    const handler=e=>{ if(barMenuRef.current&&!barMenuRef.current.contains(e.target)) setBarMenu(null); };
    document.addEventListener('mousedown',handler);
    return()=>document.removeEventListener('mousedown',handler);
  },[barMenu]);

  const saveTask=f=>{
    const {projId,initial}=taskModal;
    setProjects(projects.map(p=>{ if(p.id!==projId) return p;
      if(initial&&initial.id){ return {...p,tasks:p.tasks.map(t=>t.id===initial.id?{...t,...f,comments:t.comments||[],notes:f.notes||''}:t)}; }
      return {...p,tasks:[...p.tasks,{...f,id:genId(),comments:[],notes:f.notes||''}]};
    }));
    setTaskModal(null);
  };
  const saveNote=()=>{ if(!noteModal) return; setProjects(projects.map(p=>p.id!==noteModal.projId?p:{...p,tasks:p.tasks.map(t=>t.id!==noteModal.taskId?t:{...t,notes:noteModal.notes})})); setNoteModal(null); };

  return(
    <div className="fade-in">
      <div className="section-header"><h3>📅 Gantt Chart</h3></div>

      <div className="gantt-range-bar no-print">
        <span style={{fontSize:'11px',fontWeight:700,color:'#374151'}}>📆 ช่วงเวลา:</span>
        <div style={{display:'flex',alignItems:'center',gap:'6px',flexWrap:'wrap'}}>
          <label style={{marginBottom:0,whiteSpace:'nowrap'}}>เริ่ม</label>
          <input type="date" value={rangeStart} onChange={e=>setRangeStart(e.target.value)} style={{maxWidth:'140px'}}/>
          <span style={{color:'#9ca3af'}}>—</span>
          <label style={{marginBottom:0,whiteSpace:'nowrap'}}>ถึง</label>
          <input type="date" value={rangeEnd} onChange={e=>setRangeEnd(e.target.value)} style={{maxWidth:'140px'}}/>
          <button className="btn-outline btn-sm" onClick={()=>{ const d=new Date(); const s=new Date(d.getFullYear(),d.getMonth(),1); const e2=new Date(d.getFullYear(),d.getMonth()+3,0); setRangeStart(ymd(s)); setRangeEnd(ymd(e2)); }}>3 เดือน</button>
          <button className="btn-outline btn-sm" onClick={()=>{ const d=new Date(); const s=new Date(d.getFullYear(),d.getMonth(),1); const e2=new Date(d.getFullYear(),d.getMonth()+6,0); setRangeStart(ymd(s)); setRangeEnd(ymd(e2)); }}>6 เดือน</button>
          <button className="btn-outline btn-sm" onClick={()=>{ const d=new Date(); const s=new Date(d.getFullYear(),0,1); const e2=new Date(d.getFullYear(),11,31); setRangeStart(ymd(s)); setRangeEnd(ymd(e2)); }}>ปีนี้</button>
          <button className="btn-primary btn-sm" onClick={()=>{ setRangeStart(globalMin); setRangeEnd(globalMax); }}>ทั้งโครงการ</button>
        </div>
        <div style={{display:'flex',gap:'6px',marginLeft:'auto',flexWrap:'wrap'}}>
          <select value={selProj} onChange={e=>setSelProj(e.target.value)} style={{fontSize:'11px',padding:'4px 7px'}}>
            <option value="all">ทุกโครงการ</option>
            {projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
          </select>
          <select value={levelFilter} onChange={e=>setLevelFilter(e.target.value)} style={{fontSize:'11px',padding:'4px 7px'}}>
            <option value="all">ทุกระดับ</option>
            <option value="0">📌 หลักเท่านั้น</option>
            <option value="01">📌+📎 หลัก+รอง</option>
          </select>
        </div>
      </div>

      <div className="gantt-wrap">
        {/* Month header */}
        <div className="gantt-proj-header" style={{marginTop:0,marginBottom:'2px'}}>
          <div style={{fontSize:'11px',fontWeight:700,color:'#374151'}}>กิจกรรม / ผู้รับผิดชอบ</div>
          <div className="gantt-month-row">
            {months.map((m,i)=><div key={i} className="gantt-month-lbl" style={{left:`${m.pct}%`}}>{m.label}</div>)}
          </div>
        </div>
        <hr style={{borderColor:'#e5e7eb',marginBottom:'6px'}}/>

        {visible.map(proj=>{
          // กรอง + เรียงแบบ hierarchical
          const allFiltered=proj.tasks.filter(t=>{
            if(levelFilter==='0') return t.level===0;
            if(levelFilter==='01') return t.level<=1;
            return true;
          }).filter(t=>t.dueDate);
          const tasks=sortHierarchically(allFiltered).filter(t=>isTaskVisible(t,allFiltered));
          return(
            <div key={proj.id} style={{marginBottom:'14px'}}>
              {/* Project header row with + button */}
              <div className="gantt-proj-header" style={{marginTop:0}}>
                <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
                  <span style={{fontWeight:700,color:proj.color,fontSize:'12px'}}>📁 {proj.name}</span>
                  <button className="btn-info btn-xs no-print" title="เพิ่มกิจกรรมในโครงการนี้" onClick={()=>setTaskModal({projId:proj.id})}>➕ เพิ่ม</button>
                </div>
                <div style={{position:'relative',height:'6px',background:`${proj.color}22`,borderRadius:'3px'}}>
                  <div style={{position:'absolute',left:`${pct(proj.startDate)}%`,width:`${Math.max(1,pct(proj.endDate)-pct(proj.startDate))}%`,height:'100%',background:proj.color,borderRadius:'3px',opacity:.5}}/>
                  <div className="gantt-today-line" style={{left:`${todayPct}%`,height:'16px',top:'-5px'}}/>
                </div>
              </div>
              {tasks.map(t=>{
                const sp=Math.max(0,pct(t.startDate||t.dueDate));
                const dur=Math.max(0.8,pct(t.dueDate)-pct(t.startDate||t.dueDate));
                const color=t.level===0?(proj.color||'#6366f1'):t.level===1?'#10b981':'#f59e0b';
                const opacity=t.status==='เสร็จสิ้น'?0.45:t.status==='รอดำเนินการ'?0.7:1;
                const children=allFiltered.filter(c=>c.parentId===t.id);
                const hasChildren=children.length>0;
                const isCollapsed=collapsedTasks.has(t.id);
                return(
                  <div key={t.id} className="gantt-row">
                    <div className="gantt-label" style={{paddingLeft:`${t.level*10}px`}}>
                      {/* ▼/▶ toggle สำหรับ task ที่มีลูก */}
                      {hasChildren
                        ? <span onClick={e=>{e.stopPropagation();toggleCollapse(t.id);}}
                            style={{cursor:'pointer',fontSize:'9px',marginRight:'3px',color:'#6366f1',userSelect:'none',fontWeight:700}}
                            title={isCollapsed?'คลิกแสดงกิจกรรมลูก':'คลิกซ่อนกิจกรรมลูก'}>
                            {isCollapsed?'▶':'▼'}
                          </span>
                        : <span style={{display:'inline-block',width:'12px'}}/>
                      }
                      <LevelBadge level={t.level}/>{t.name}
                      {hasChildren&&<span style={{fontSize:'8px',color:'#9ca3af',marginLeft:'3px'}}>({isCollapsed?`+${children.length}`:''})</span>}
                      {t.notes&&<span style={{marginLeft:'3px',fontSize:'9px',cursor:'help'}} title={t.notes}>📝</span>}
                      <div style={{fontSize:'9px',color:'#9ca3af',paddingLeft:`${t.level*10+15}px`}}>{t.assignee}</div>
                    </div>
                    <div className="gantt-bar-cont">
                      <div className="gantt-bar"
                        style={{left:`${sp}%`,width:`${Math.min(dur,100-sp)}%`,background:color,opacity,cursor:'pointer'}}
                        onMouseEnter={e=>setTooltip({x:e.clientX,y:e.clientY,task:t,projectName:proj.name})}
                        onMouseLeave={()=>setTooltip(null)}
                        onClick={e=>{ e.stopPropagation(); setBarMenu({task:t,proj,x:e.clientX,y:e.clientY,hasChildren,isCollapsed}); setTooltip(null); }}
                      >
                        {fmt(t.startDate,{month:'short',day:'numeric'})}–{fmt(t.dueDate,{month:'short',day:'numeric'})}
                        {t.notes&&<span className="bar-note-dot"/>}
                      </div>
                      <div className="gantt-today-line" style={{left:`${todayPct}%`}}/>
                    </div>
                  </div>
                );
              })}
              {tasks.length===0&&<div style={{marginLeft:'4px',fontSize:'10px',color:'#9ca3af',padding:'4px 0'}}>ไม่มีกิจกรรมในช่วงนี้</div>}
            </div>
          );
        })}
      </div>
      <div style={{fontSize:'10px',color:'#6b7280',marginTop:'6px',display:'flex',gap:'14px',flexWrap:'wrap'}}>
        <span>🟣 หลัก &nbsp; 🟢 รอง &nbsp; 🟡 ย่อย</span>
        <span>ความเข้ม: กำลังทำ=100% | รอ=70% | เสร็จ=45%</span>
        <span style={{color:'#ef4444'}}>┃ วันปัจจุบัน</span>
      </div>

      {/* Bar context menu */}
      {barMenu&&(
        <div ref={barMenuRef} className="bar-menu" style={{top:barMenu.y,left:barMenu.x}}>
          <div className="bar-menu-title">{barMenu.task.name}</div>
          <button className="bar-menu-item" onClick={()=>{ setBarMenu(null); setTaskModal({projId:barMenu.proj.id,initial:barMenu.task}); }}>✏️ แก้ไขกิจกรรม</button>
          {barMenu.task.level<2&&<button className="bar-menu-item" onClick={()=>{ setBarMenu(null); setTaskModal({projId:barMenu.proj.id,initial:{name:'',description:'',notes:'',level:barMenu.task.level+1,parentId:barMenu.task.id,assignee:members[0]?.name||'',startDate:barMenu.task.startDate||TODAY,dueDate:barMenu.task.dueDate||'',priority:barMenu.task.priority||'ปกติ',status:'รอดำเนินการ'}}); }}>➕ เพิ่มกิจกรรม{barMenu.task.level===0?'รอง':'ย่อย'}</button>}
          <button className="bar-menu-item" onClick={()=>{ setBarMenu(null); setNoteModal({projId:barMenu.proj.id,taskId:barMenu.task.id,notes:barMenu.task.notes||''}); }}>{barMenu.task.notes?'📝 ดู/แก้ไขโน๊ต':'📝 เพิ่มโน๊ต'}</button>
          {barMenu.hasChildren&&<button className="bar-menu-item" onClick={()=>{ setBarMenu(null); toggleCollapse(barMenu.task.id); }}>{barMenu.isCollapsed?'▶ แสดงกิจกรรมลูก':'▼ ซ่อนกิจกรรมลูก'}</button>}
        </div>
      )}

      {/* Note modal */}
      {noteModal&&(
        <Modal show onClose={()=>setNoteModal(null)} title="📝 โน๊ตกิจกรรม" size="sm">
          <textarea rows={5} value={noteModal.notes} onChange={e=>setNoteModal({...noteModal,notes:e.target.value})} placeholder="บันทึกโน๊ตภายใน เช่น ข้อควรระวัง, ลิงก์อ้างอิง, ข้อตกลง..."/>
          <div style={{display:'flex',gap:'6px',marginTop:'8px'}}>
            <button className="btn-success" onClick={saveNote}>💾 บันทึก</button>
            <button className="btn-secondary" onClick={()=>setNoteModal(null)}>ยกเลิก</button>
          </div>
        </Modal>
      )}

      {/* Gantt tooltip (shows notes) */}
      {tooltip&&(
        <div className="tooltip-box" style={{top:tooltip.y-10,left:tooltip.x+16}}>
          <div style={{fontWeight:700,marginBottom:2}}>{tooltip.task.name}</div>
          {tooltip.projectName&&<div style={{color:'#9ca3af',fontSize:'10px'}}>{tooltip.projectName}</div>}
          <div>👤 {tooltip.task.assignee}</div>
          <div>📅 {fmt(tooltip.task.startDate,{month:'short',day:'numeric'})} – {fmt(tooltip.task.dueDate,{month:'short',day:'numeric'})}</div>
          <div style={{marginTop:2}}>{getDueStatus(tooltip.task).text}</div>
          {tooltip.task.notes&&<div style={{marginTop:4,borderTop:'1px solid #374151',paddingTop:4,color:'#fde68a',fontSize:'10px'}}>📝 {tooltip.task.notes}</div>}
        </div>
      )}

      {taskModal&&<TaskForm
        initial={taskModal.initial||null}
        projectId={taskModal.projId} projects={projects} members={members} onSave={saveTask} onClose={()=>setTaskModal(null)}/>}
    </div>
  );
}

// ── WORKLOAD VIEW ─────────────────────────────────────────
function WorkloadView({projects,members}){
  const [filterM,setFilterM]=useState('all');
  const allTasks=projects.flatMap(p=>p.tasks.map(t=>({...t,projectName:p.name})));
  const workMap=useMemo(()=>{
    const m={};
    members.forEach(mb=>{m[mb.name]={...mb,total:0,done:0,inprog:0,pending:0,urgent:0,overdue:0,tasks:[]};});
    allTasks.forEach(t=>{
      if(!m[t.assignee]) m[t.assignee]={name:t.assignee,role:'',email:'',total:0,done:0,inprog:0,pending:0,urgent:0,overdue:0,tasks:[]};
      const w=m[t.assignee]; w.total++; w.tasks.push(t);
      if(t.status==='เสร็จสิ้น') w.done++;
      else if(t.status==='ในการทำงาน') w.inprog++;
      else w.pending++;
      if(t.status!=='เสร็จสิ้น'){ const d=daysLeft(t.dueDate); if(d<0) w.overdue++; else if(d<=3) w.urgent++; }
    });
    return Object.values(m).sort((a,b)=>b.total-a.total);
  },[projects,members]);
  const visible=filterM==='all'?workMap:workMap.filter(w=>w.name===filterM);
  return(
    <div className="fade-in">
      <div className="section-header">
        <h3>👥 Workload ทีมงาน</h3>
        <select value={filterM} onChange={e=>setFilterM(e.target.value)} style={{fontSize:'11px',padding:'4px 7px'}}>
          <option value="all">ทุกคน</option>
          {workMap.map(w=><option key={w.name} value={w.name}>{w.name}</option>)}
        </select>
      </div>
      <div className="workload-grid">
        {visible.map((w,i)=>(
          <div key={i} className="workload-card">
            <div style={{display:'flex',gap:'9px',alignItems:'center',marginBottom:'9px'}}>
              <div className="avatar">{w.name.charAt(0)}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:700,fontSize:'13px'}}>{w.name}</div>
                <div style={{fontSize:'10px',color:'#6b7280'}}>{w.role||'ทีมงาน'}</div>
                {w.email&&<div style={{fontSize:'10px',color:'#6366f1'}}>{w.email}</div>}
              </div>
              {(w.overdue+w.urgent)>0&&<div style={{background:'#fee2e2',color:'#991b1b',padding:'2px 7px',borderRadius:'10px',fontSize:'10px',fontWeight:700}}>🔥{w.overdue+w.urgent}</div>}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'5px',marginBottom:'8px'}}>
              {[{v:w.done,l:'เสร็จ',c:'#d1fae5',tc:'#065f46'},{v:w.inprog,l:'กำลังทำ',c:'#dbeafe',tc:'#1e40af'},{v:w.pending,l:'รอ',c:'#fef3c7',tc:'#92400e'},{v:w.overdue+w.urgent,l:'เร่งด่วน',c:'#fee2e2',tc:'#991b1b'}].map((s,si)=>(
                <div key={si} style={{background:s.c,borderRadius:'5px',padding:'5px 3px',textAlign:'center'}}>
                  <div style={{fontSize:'16px',fontWeight:700,color:s.tc}}>{s.v}</div>
                  <div style={{fontSize:'9px',fontWeight:600,color:s.tc}}>{s.l}</div>
                </div>
              ))}
            </div>
            <div className="progress-bar"><div className="progress-fill" style={{width:`${w.total?Math.round(w.done/w.total*100):0}%`,background:'linear-gradient(90deg,#10b981,#059669)'}}/></div>
            <div style={{fontSize:'9px',color:'#6b7280',textAlign:'right',marginTop:'2px'}}>{w.total?Math.round(w.done/w.total*100):0}% ({w.total} งาน)</div>
            {filterM!=='all'&&w.tasks.slice(0,5).map((t,ti)=>{
              const ds=getDueStatus(t);
              return(<div key={ti} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:'6px',padding:'4px 6px',background:'#f9fafb',borderRadius:'4px',gap:'6px'}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:'10px',fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.name}</div>
                  <div style={{fontSize:'9px',color:'#6b7280'}}>{t.projectName}</div>
                </div>
                <span className={`due-alert ${ds.cls}`}>{ds.text}</span>
              </div>);
            })}
          </div>
        ))}
        {!visible.length&&<div className="empty">ยังไม่มีข้อมูล</div>}
      </div>
    </div>
  );
}

// ── CALENDAR VIEW ─────────────────────────────────────────
function CalendarView({projects,members,events,setEvents,currentUser,dayNotes,setDayNotes,reminders,setReminders}){
  const [month,setMonth]=useState(()=>{ const d=new Date(); return {year:d.getFullYear(),month:d.getMonth()}; });
  const [filterM,setFilterM]=useState(currentUser||'all');
  const [showEvForm,setShowEvForm]=useState(null); // null | {date} | {event(edit)}
  const [detailItem,setDetailItem]=useState(null);
  const [dayModal,setDayModal]=useState(null);      // {date}

  const firstDay=new Date(month.year,month.month,1);
  const lastDay=new Date(month.year,month.month+1,0);
  const startDOW=firstDay.getDay(); // 0=Sun
  const cells=[];
  // Prev month padding
  for(let i=0;i<startDOW;i++){
    const d=new Date(month.year,month.month,-(startDOW-1-i));
    cells.push({date:ymd(d),isOther:true});
  }
  for(let d=1;d<=lastDay.getDate();d++){
    cells.push({date:`${month.year}-${String(month.month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`,isOther:false});
  }
  while(cells.length%7!==0){
    const last=new Date(cells[cells.length-1].date);
    last.setDate(last.getDate()+1);
    cells.push({date:ymd(last),isOther:true});
  }

  const allTasks=projects.flatMap(p=>p.tasks.map(t=>({...t,projectColor:p.color,projectName:p.name})));

  const tasksForDate=date=>allTasks.filter(t=>t.dueDate===date&&(filterM==='all'||t.assignee===filterM));
  const eventsForDate=date=>events.filter(ev=>ev.date===date&&(filterM==='all'||ev.attendees.length===0||ev.attendees.includes(filterM))).sort((a,b)=>a.time.localeCompare(b.time));

  const saveEvent=f=>{
    if(showEvForm.event){setEvents(events.map(ev=>ev.id===showEvForm.event.id?{...ev,...f}:ev));}
    else{setEvents([...events,{...f,id:genId()}]);}
    setShowEvForm(null);
  };
  const delEvent=id=>{ if(window.confirm('ลบกิจกรรมนี้?')) setEvents(events.filter(ev=>ev.id!==id)); };

  const prevMonth=()=>setMonth(m=>m.month===0?{year:m.year-1,month:11}:{...m,month:m.month-1});
  const nextMonth=()=>setMonth(m=>m.month===11?{year:m.year+1,month:0}:{...m,month:m.month+1});
  const toToday=()=>{ const d=new Date(); setMonth({year:d.getFullYear(),month:d.getMonth()}); };

  return(
    <div className="fade-in">
      <div className="cal-header">
        <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
          <button className="btn-outline btn-sm" onClick={prevMonth}>◀</button>
          <span style={{fontWeight:700,fontSize:'15px',minWidth:'130px',textAlign:'center'}}>{firstDay.toLocaleDateString('th-TH',{month:'long',year:'numeric'})}</span>
          <button className="btn-outline btn-sm" onClick={nextMonth}>▶</button>
          <button className="btn-ghost btn-sm" onClick={toToday}>วันนี้</button>
        </div>
        <div style={{display:'flex',gap:'6px',alignItems:'center',flexWrap:'wrap'}}>
          <select value={filterM} onChange={e=>setFilterM(e.target.value)} style={{fontSize:'11px',padding:'4px 7px'}}>
            <option value="all">ทุกคน</option>
            {members.map(m=><option key={m.id} value={m.name}>{m.name}</option>)}
          </select>
          <button className="btn-success btn-sm" onClick={()=>setShowEvForm({date:TODAY})}>➕ เพิ่มนัดหมาย</button>
        </div>
      </div>

      {/* Calendar legend */}
      <div style={{display:'flex',gap:'10px',alignItems:'center',marginBottom:'6px',flexWrap:'wrap',fontSize:'10px',color:'#6b7280'}}>
        <span style={{display:'flex',alignItems:'center',gap:'3px'}}><span style={{width:10,height:10,borderRadius:2,background:'#eff6ff',border:'1px solid #bfdbfe',display:'inline-block'}}></span>วันเสาร์</span>
        <span style={{display:'flex',alignItems:'center',gap:'3px'}}><span style={{width:10,height:10,borderRadius:2,background:'#fff1f2',border:'1px solid #fecdd3',display:'inline-block'}}></span>วันอาทิตย์</span>
        <span style={{display:'flex',alignItems:'center',gap:'3px'}}><span style={{width:10,height:10,borderRadius:2,background:'#fffbeb',border:'1px solid #fde68a',display:'inline-block'}}></span>วันหยุดนักขัตฤกษ์</span>
        <span style={{display:'flex',alignItems:'center',gap:'3px'}}><span style={{width:10,height:10,borderRadius:2,background:'#fafbff',border:'1px solid #6366f1',display:'inline-block'}}></span>วันนี้</span>
      </div>
      <div className="cal-grid">
        {['อา','จ','อ','พ','พฤ','ศ','ส'].map((d,di)=>(
          <div key={d} className="cal-day-name" style={{color:di===0?'#e11d48':di===6?'#2563eb':'#6b7280'}}>{d}</div>
        ))}
        {cells.map((cell,i)=>{
          const isToday=cell.date===TODAY;
          const tasks=tasksForDate(cell.date);
          const evs=eventsForDate(cell.date);
          const dayNum=Number(cell.date.split('-')[2]);
          const dow=new Date(cell.date+'T00:00:00').getDay(); // 0=Sun,6=Sat
          const holidayName=THAI_HOLIDAYS[cell.date]||null;
          const isSat=dow===6, isSun=dow===0, isHoliday=!!holidayName;
          const hasNote=!!(dayNotes&&dayNotes[cell.date]&&dayNotes[cell.date].trim());
          const cellCls=`cal-cell${isToday?' today':''}${cell.isOther?' other-month':''}${isSat&&!isToday?' sat':''}${isSun&&!isToday?' sun':''}${isHoliday&&!isToday?' holiday':''}`;
          return(
            <div key={i} className={cellCls}
              onClick={()=>setDayModal({date:cell.date})}
            >
              {hasNote&&<span className="cal-note-dot" title="มีบันทึกประจำวัน">📝</span>}
              <button className="cal-add-btn no-print" title="เพิ่มนัดหมาย" onClick={e=>{e.stopPropagation();setShowEvForm({date:cell.date});}}>＋</button>
              <div className="cal-date" style={{userSelect:'none'}}>{dayNum}</div>
              {holidayName&&<span className="cal-holiday-name" title={holidayName}>🎌 {holidayName}</span>}
              {evs.slice(0,2).map(ev=>(
                <div key={ev.id} className={`cal-chip event`} title={`${ev.time} ${ev.title}`} onClick={e=>{e.stopPropagation();setDetailItem({type:'event',item:ev});}}>
                  {ev.time} {ev.title}
                </div>
              ))}
              {tasks.slice(0,2).map(t=>(
                <div key={t.id} className="cal-chip" style={{background:`${t.projectColor}20`,color:t.projectColor,borderLeft:`2px solid ${t.projectColor}`}} title={`📋 ${t.name} — ${t.assignee}`} onClick={e=>{e.stopPropagation();setDetailItem({type:'task',item:t});}}>
                  📋 {t.name}
                </div>
              ))}
              {(tasks.length+evs.length)>4&&<div style={{fontSize:'9px',color:'#9ca3af',textAlign:'center'}}>+{tasks.length+evs.length-4} อื่นๆ</div>}
            </div>
          );
        })}
      </div>
      <div style={{display:'flex',gap:'12px',marginTop:'8px',fontSize:'10px',color:'#6b7280',flexWrap:'wrap',alignItems:'center'}}>
        <span style={{background:'#e0e7ff',padding:'1px 6px',borderRadius:'3px',color:'#3730a3'}}>■ ประชุม/นัดหมาย</span>
        <span style={{background:'#ede9fe',padding:'1px 6px',borderRadius:'3px',color:'#6366f1',borderLeft:'2px solid #6366f1'}}>■ กิจกรรม/งาน (วันส่ง)</span>
        <span style={{display:'flex',alignItems:'center',gap:'3px'}}>📝 มีบันทึกประจำวัน</span>
      </div>

      {/* ── Day Detail Modal ──────────────────────────────── */}
      {dayModal&&(()=>{
        const dEvs=eventsForDate(dayModal.date);
        const dTasks=tasksForDate(dayModal.date);
        const dateLabel=new Date(dayModal.date+'T00:00:00').toLocaleDateString('th-TH',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
        return(
          <Modal show onClose={()=>setDayModal(null)} title={`📅 ${dateLabel}`} size="md">
            {/* Events */}
            <div style={{marginBottom:'12px'}}>
              <div className="day-section-hdr">
                <span>📅 นัดหมาย/กิจกรรม ({dEvs.length})</span>
                <button className="btn-success btn-xs" onClick={()=>{setDayModal(null);setShowEvForm({date:dayModal.date});}}>+ เพิ่มนัดหมาย</button>
              </div>
              {dEvs.length===0&&<div style={{fontSize:'11px',color:'#9ca3af',paddingBottom:'4px'}}>ไม่มีนัดหมาย</div>}
              {dEvs.map(ev=>(
                <div key={ev.id} style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',padding:'6px 8px',background:'#eff6ff',borderRadius:'6px',marginBottom:'4px',gap:'6px'}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:'12px'}}>{ev.time}–{ev.endTime} &nbsp;<span style={{fontWeight:400}}>{ev.title}</span></div>
                    <div style={{fontSize:'10px',color:'#6b7280'}}>🏷️ {ev.type} &nbsp;👥 {(ev.attendees||[]).join(', ')||'—'}</div>
                    {ev.description&&<div style={{fontSize:'10px',color:'#374151',marginTop:'2px'}}>{ev.description}</div>}
                  </div>
                  <div style={{display:'flex',gap:'2px',flexShrink:0}}>
                    <button className="btn-outline btn-xs" onClick={()=>{setDayModal(null);setShowEvForm({event:ev});}}>✏️</button>
                    <button className="btn-danger btn-xs" onClick={()=>delEvent(ev.id)}>🗑️</button>
                  </div>
                </div>
              ))}
            </div>

            {/* Tasks due */}
            <div style={{marginBottom:'12px'}}>
              <div className="day-section-hdr"><span>📋 งานครบกำหนด ({dTasks.length})</span></div>
              {dTasks.length===0&&<div style={{fontSize:'11px',color:'#9ca3af',paddingBottom:'4px'}}>ไม่มีงานครบกำหนดวันนี้</div>}
              {dTasks.map((t,i)=>{
                const ds=getDueStatus(t);
                return(
                  <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'5px 8px',background:'#f9fafb',borderRadius:'6px',marginBottom:'3px',gap:'6px'}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:600,fontSize:'11px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.name}</div>
                      <div style={{fontSize:'10px',color:'#6b7280'}}>{t.projectName} • {t.assignee}</div>
                    </div>
                    <span className={`due-alert ${ds.cls}`}>{ds.text}</span>
                  </div>
                );
              })}
            </div>

            {/* Day notepad */}
            <div style={{marginBottom:'12px'}}>
              <div className="day-section-hdr"><span>📝 บันทึกประจำวัน</span><span style={{fontSize:'9px',color:'#10b981',fontWeight:400}}>💾 บันทึกอัตโนมัติ</span></div>
              <textarea rows={10} value={dayNotes[dayModal.date]||''} onChange={e=>setDayNotes({...dayNotes,[dayModal.date]:e.target.value})} placeholder="จดบันทึก ข้อสรุปประชุม สิ่งที่ต้องจำ หรือ To-do วันนี้..." style={{marginBottom:0,minHeight:'200px',resize:'vertical',fontSize:'13px',lineHeight:'1.6'}}/>
            </div>

          </Modal>
        );
      })()}

      {/* Detail Modal */}
      {detailItem&&(
        <Modal show onClose={()=>setDetailItem(null)} title={detailItem.type==='event'?'📅 รายละเอียดนัดหมาย':'📋 รายละเอียดกิจกรรม'} size="sm">
          {detailItem.type==='event'?(<>
            <div style={{display:'flex',flexDirection:'column',gap:'6px',fontSize:'13px'}}>
              <div><strong>{detailItem.item.title}</strong></div>
              <div>📅 {fmt(detailItem.item.date)} &nbsp; 🕐 {detailItem.item.time}–{detailItem.item.endTime}</div>
              <div>🏷️ {detailItem.item.type}</div>
              <div>👥 {(detailItem.item.attendees||[]).join(', ')||'—'}</div>
              {detailItem.item.description&&<div style={{background:'#f9fafb',padding:'8px',borderRadius:'6px'}}>{detailItem.item.description}</div>}
            </div>
            <div style={{display:'flex',gap:'6px',marginTop:'12px'}}>
              <button className="btn-outline btn-sm" onClick={()=>{setDetailItem(null);setShowEvForm({event:detailItem.item});}}>✏️ แก้ไข</button>
              <button className="btn-danger btn-sm" onClick={()=>{delEvent(detailItem.item.id);setDetailItem(null);}}>🗑️ ลบ</button>
              <button className="btn-secondary btn-sm" onClick={()=>setDetailItem(null)}>ปิด</button>
            </div>
          </>):(<>
            <div style={{display:'flex',flexDirection:'column',gap:'6px',fontSize:'13px'}}>
              <div><strong>{detailItem.item.name}</strong></div>
              <div>📁 {detailItem.item.projectName}</div>
              <div>👤 {detailItem.item.assignee}</div>
              <div>📅 กำหนดส่ง: {fmt(detailItem.item.dueDate)}</div>
              <div><span className={`due-alert ${getDueStatus(detailItem.item).cls}`}>{getDueStatus(detailItem.item).text}</span></div>
              {detailItem.item.description&&<div style={{background:'#f9fafb',padding:'8px',borderRadius:'6px'}}>{detailItem.item.description}</div>}
            </div>
            <button className="btn-secondary btn-sm" style={{marginTop:'12px'}} onClick={()=>setDetailItem(null)}>ปิด</button>
          </>)}
        </Modal>
      )}

      {showEvForm&&<EventForm initial={showEvForm.event||{date:showEvForm.date||TODAY,time:'09:00',endTime:'10:00',attendees:filterM!=='all'?[filterM]:[],type:'ประชุม',title:'',description:''}} members={members} onSave={saveEvent} onClose={()=>setShowEvForm(null)}/>}
    </div>
  );
}

// ── DASHBOARD VIEW ────────────────────────────────────────
function DashboardView({projects,setProjects,members,events,setEvents,currentUser,reminders,dayNotes,setDayNotes}){
  const [tooltip,setTooltip]=useState(null);
  const [chartTooltip,setChartTooltip]=useState(null);
  const [taskViewModal,setTaskViewModal]=useState(null);   // {projId, task} — view only
  const [taskDetailModal,setTaskDetailModal]=useState(null); // {projId, task} — edit form
  const [evDetailModal,setEvDetailModal]=useState(null);   // event object — view
  const [eventEditModal,setEventEditModal]=useState(null); // event object — edit form
  const [noteEditMode,setNoteEditMode]=useState(false);
  const [noteText,setNoteText]=useState('');

  const allTasks=projects.flatMap(p=>p.tasks.map(t=>({...t,projId:p.id,pn:p.name})));

  const getParentChain=(task)=>{
    const allProjTasks=projects.find(p=>p.id===task.projId)?.tasks||[];
    const chain=[]; let cur=task;
    while(cur.parentId){ const par=allProjTasks.find(t=>t.id===cur.parentId); if(!par) break; chain.unshift(par.name); cur=par; }
    return chain;
  };

  const saveTask=f=>{
    const {projId,task}=taskDetailModal;
    setProjects(projects.map(p=>p.id!==projId?p:{...p,tasks:p.tasks.map(t=>t.id===task.id?{...t,...f,comments:t.comments||[],notes:f.notes||''}:t)}));
    setTaskDetailModal(null);
  };
  const saveEvent=f=>{
    setEvents(events.map(ev=>ev.id===f.id?{...ev,...f}:ev));
    setEventEditModal(null);
  };

  const stats={
    projects:projects.length, tasks:allTasks.length,
    done:allTasks.filter(t=>t.status==='เสร็จสิ้น').length,
    inprog:allTasks.filter(t=>t.status==='ในการทำงาน').length,
    overdue:allTasks.filter(t=>t.status!=='เสร็จสิ้น'&&daysLeft(t.dueDate)<0).length,
    urgent:allTasks.filter(t=>t.status!=='เสร็จสิ้น'&&daysLeft(t.dueDate)>=0&&daysLeft(t.dueDate)<=3).length,
    members:members.length,
  };

  // Today's items for currentUser
  const todayTasks=allTasks.filter(t=>t.dueDate===TODAY&&(currentUser==='all'||t.assignee===currentUser));
  const todayEvents=events.filter(ev=>ev.date===TODAY&&(currentUser==='all'||ev.attendees.includes(currentUser)));
  const todayReminders=(reminders||[]).filter(r=>r.date===TODAY&&!r.done);
  const todayAll=[
    ...todayEvents.map(ev=>({type:'event',label:`${ev.time} — ${ev.title}`,color:'#6366f1',time:ev.time,data:ev})),
    ...todayReminders.map(r=>({type:'reminder',label:`⏰ ${r.text}`,color:'#f59e0b',time:r.time,data:r})),
    ...todayTasks.map(t=>({type:'task',label:`📋 ${t.name}`,color:getDueStatus(t).color,time:'—',data:t})),
  ].sort((a,b)=>a.time.localeCompare(b.time));

  // Monthly chart
  const monthStats=useMemo(()=>{
    const map={};
    allTasks.forEach(t=>{if(!t.dueDate)return; const k=t.dueDate.slice(0,7); if(!map[k])map[k]={key:k,total:0,done:0,tasks:[]}; map[k].total++; if(t.status==='เสร็จสิ้น')map[k].done++; map[k].tasks.push({...t,projectName:(projects.find(p=>p.tasks.some(pt=>pt.id===t.id))||{}).name||''});});
    return Object.values(map).sort((a,b)=>a.key.localeCompare(b.key)).slice(-6);
  },[allTasks]);
  const maxMV=Math.max(...monthStats.map(m=>m.total),1);

  // Timeline: all project dates
  const tlDates=projects.flatMap(p=>[p.startDate,p.endDate].filter(Boolean));
  const tlMin=tlDates.length?new Date(tlDates.reduce((a,b)=>a<b?a:b)):new Date();
  const tlMax=tlDates.length?new Date(tlDates.reduce((a,b)=>a>b?a:b)):new Date();
  tlMin.setDate(tlMin.getDate()-7); tlMax.setDate(tlMax.getDate()+7);
  const tlTotal=Math.max(1,tlMax-tlMin);
  const tlPct=d=>Math.max(0,Math.min(100,(toDate(d)-tlMin)/tlTotal*100));
  const todayTLPct=tlPct(new Date());

  return(
    <div className="fade-in">
      {/* Today summary */}
      {todayAll.length>0&&(
        <div className="today-section">
          <h3 style={{marginBottom:'8px',color:'#5b21b6'}}>
            📌 วันนี้ {currentUser!=='all'&&<span style={{fontWeight:400,fontSize:'12px'}}>— {currentUser}</span>}
            <span style={{float:'right',fontWeight:400,fontSize:'11px',color:'#7c3aed'}}>{new Date().toLocaleDateString('th-TH',{weekday:'long',day:'numeric',month:'long'})}</span>
          </h3>
          {todayAll.map((item,i)=>(
            <div key={i} className="today-item"
              style={{cursor:(item.type==='task'||item.type==='event')?'pointer':'default'}}
              onClick={()=>{
                if(item.type==='task') setTaskViewModal({projId:item.data.projId,task:item.data});
                if(item.type==='event') setEvDetailModal(item.data);
              }}
              title={(item.type==='task'||item.type==='event')?'คลิกเพื่อดูรายละเอียด':''}
            >
              <div className="today-dot" style={{background:item.color}}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:'12px',fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.label}</div>
                {item.type==='event'&&(
                  <div style={{fontSize:'10px',color:'#6b7280'}}>
                    🕐 {item.data.time}–{item.data.endTime}
                    {(item.data.attendees||[]).length>0&&<span> &nbsp;👥 {item.data.attendees.slice(0,2).join(', ')}{item.data.attendees.length>2&&` +${item.data.attendees.length-2}`}</span>}
                  </div>
                )}
                {item.type==='task'&&item.data.assignee&&<div style={{fontSize:'10px',color:'#6b7280'}}>👤 {item.data.assignee} {item.data.pn&&`· ${item.data.pn}`}</div>}
                {item.type==='reminder'&&<div style={{fontSize:'10px',color:'#9ca3af'}}>🕐 {item.time}</div>}
              </div>
